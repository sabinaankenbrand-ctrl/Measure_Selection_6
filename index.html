<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Measure Selection</title>

<style>
/* ==================================================================
   RESET
   ================================================================== */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

/* ==================================================================
   PAGE SHELL (body, header)
   ================================================================== */
body {
  font-family: system-ui, sans-serif;
  background: #eef7fa;
  color: #1a2a3a;
  display: flex;
  flex-direction: column;
}

header {
  background: #1187a7;
  color: white;
  padding: 12px 20px;
  flex-shrink: 0;
}

header h1 {
  font-size: 1rem;
  font-weight: 600;
}

#reach-display, #problem-display {
  font-size: 0.75rem;
  opacity: 0.9;
  margin-top: 3px;
}

/* ==================================================================
   MAIN REFINEMENT LAYOUT (suggested measures + selected panel)
   ================================================================== */
.layout {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.panel-left {
  width: 60%;
  background: white;
  border-right: 1px solid #d0dce8;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-right {
  flex: 1;
  background: white;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid #d0dce8;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8aa0b0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.selected-count {
  background: #1187a7;
  color: white;
  border-radius: 8px;
  padding: 1px 7px;
  font-size: 0.65rem;
}

.list-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}

.group-header {
  padding: 8px 14px 4px;
  position: sticky;
  top: 0;
  background: white;
  z-index: 1;
  border-bottom: 1px solid #e8eef5;
}

.group-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: #4a6070;
}

.measure-item {
  padding: 7px 14px 7px 18px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s;
}

.measure-item:hover {
  background: #eef7fa;
  border-left-color: #1187a7;
}

.measure-item.checked {
  background: #e6f5fa;
  border-left-color: #1187a7;
}

.measure-item input[type="checkbox"] {
  margin-top: 2px;
  flex-shrink: 0;
  accent-color: #1187a7;
  width: 14px;
  height: 14px;
  pointer-events: none;
}

.measure-id {
  font-size: 0.63rem;
  font-weight: 600;
  color: #1187a7;
  background: #d6eef5;
  border-radius: 3px;
  padding: 2px 4px;
  flex-shrink: 0;
  margin-top: 1px;
  white-space: nowrap;
}

.measure-name {
  font-size: 0.81rem;
  color: #2c3e50;
  line-height: 1.4;
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #aaa;
  font-size: 0.82rem;
  text-align: center;
  padding: 20px;
}

.selected-item {
  padding: 7px 14px 7px 18px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  border-left: 3px solid #1187a7;
  border-bottom: 1px solid #e8eef5;
}

.selected-item .sid {
  font-size: 0.63rem;
  font-weight: 600;
  color: #1187a7;
  background: #d6eef5;
  border-radius: 3px;
  padding: 2px 4px;
  flex-shrink: 0;
  white-space: nowrap;
  margin-top: 1px;
}

.selected-item .sname {
  font-size: 0.81rem;
  color: #2c3e50;
  line-height: 1.4;
}

.footer {
  padding: 10px 14px;
  border-top: 1px solid #d0dce8;
  flex-shrink: 0;
  background: white;
}

.confirm-button {
  width: 100%;
  padding: 9px;
  background: #1187a7;
  color: white;
  border: none;
  border-radius: 6px;
  font-family: system-ui, sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
}

.confirm-button:hover { background: #0e7692; }
.confirm-button:disabled { background: #8aa0b0; cursor: not-allowed; }

.status-message {
  margin-top: 8px;
  font-size: 0.75rem;
  line-height: 1.35;
  color: #4a6070;
}

.status-message.success { color: #1e8449; }
.status-message.error { color: #c0392b; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #d0dce8; border-radius: 2px; }

/* ==================================================================
   CONTEXT FILTERS PANEL (impounded / barrier questions)
   ================================================================== */
.context-panel {
  background: #f8fbfd;
  border: 1px solid #d0dce8;
  border-radius: 8px;
  margin: 8px 14px 8px 14px;
  padding: 10px 14px;
  flex-shrink: 0;
}

.context-title {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8aa0b0;
  margin-bottom: 8px;
}

.context-question-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
}

.context-question-row .context-question-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: #2c3e50;
  min-width: 260px;
}

.radio-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.radio-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.78rem;
  cursor: pointer;
}

.radio-pill input { accent-color: #1187a7; }

.context-actions {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.secondary-button {
  padding: 8px 12px;
  background: white;
  color: #1187a7;
  border: 1px solid #1187a7;
  border-radius: 6px;
  font-family: system-ui, sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
}

.secondary-button:hover { background: #eef7fa; }

.context-note {
  font-size: 0.75rem;
  color: #4a6070;
  line-height: 1.35;
}

.edit-answers-button {
  background: none;
  border: none;
  color: #1187a7;
  font-size: 0.72rem;
  font-weight: 600;
  text-decoration: underline;
  cursor: pointer;
  padding: 6px 14px;
  margin: 0;
}

.edit-answers-button:hover { color: #0e7692; }

.hidden { display: none !important; }

/* ==================================================================
   ASSIGNMENT DASHBOARD (tabs, list panel, tool panel)
   ================================================================== */
.assignment-dashboard {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: white;
}

.assignment-tabs {
  padding: 10px;
  border-bottom: 1px solid #d0dce8;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  background: #f8fbfd;
}

.assignment-tab {
  border: 1px solid #c8d7e3;
  border-radius: 7px;
  padding: 6px 10px;
  font-size: 0.75rem;
  font-weight: 600;
  background: white;
  color: #8aa0b0;
  cursor: pointer;
}

.assignment-tab.has-none {
  color: #aab8c5;
  background: #f6f8fa;
}

.assignment-tab.assigned {
  color: #166534;
  border-color: #22c55e;
  background: #f0fdf4;
}

.assignment-tab.pending {
  color: #b91c1c;
  border-color: #ef4444;
  background: #fff7ed;
}

.assignment-tab.active {
  color: white;
  background: #1187a7;
  border-color: #1187a7;
}

.assignment-body {
  flex: 1;
  overflow: hidden;
  display: grid;
  grid-template-columns: 48% 52%;
  min-height: 0;
}

.assignment-list-panel, .assignment-tool-panel {
  padding: 14px;
  overflow-y: auto;
  min-height: 0;
}

.assignment-list-panel {
  border-right: 1px solid #d0dce8;
}

.assignment-title {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 5px;
  color: #2c3e50;
}

.assignment-summary {
  font-size: 0.78rem;
  color: #4a6070;
  margin-bottom: 10px;
}

.assignment-measure {
  border: 1px solid #e1eaf2;
  border-radius: 7px;
  padding: 8px;
  margin-bottom: 7px;
  background: #fff;
}

.assignment-measure.assigned {
  border-left: 4px solid #22c55e;
}

.assignment-measure.pending {
  border-left: 4px solid #ef4444;
}

.assignment-measure-head {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

.assignment-status-badge {
  margin-left: auto;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 999px;
  text-transform: uppercase;
}

.assignment-status-badge.assigned { background: #dcfce7; color: #166534; }
.assignment-status-badge.pending { background: #fee2e2; color: #991b1b; }
.assignment-status-badge.unclassified { background: #e5e7eb; color: #374151; }

.tool-card {
  border: 1px solid #d0dce8;
  border-radius: 8px;
  padding: 12px;
  background: #f8fbfd;
}

.tool-card label {
  display: block;
  font-size: 0.72rem;
  font-weight: 700;
  color: #4a6070;
  margin: 8px 0 4px;
}

.tool-card input {
  width: 100%;
  padding: 8px;
  border: 1px solid #c8d7e3;
  border-radius: 6px;
  font-family: system-ui, sans-serif;
}

.tool-hint {
  font-size: 0.76rem;
  color: #4a6070;
  line-height: 1.45;
  margin-bottom: 8px;
}

.assignment-dashboard-header {
  padding: 10px 14px;
  border-bottom: 1px solid #d0dce8;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: white;
  flex-shrink: 0;
}

.assignment-dashboard-title {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8aa0b0;
}

.back-button {
  padding: 7px 11px;
  background: white;
  color: #1187a7;
  border: 1px solid #1187a7;
  border-radius: 6px;
  font-family: system-ui, sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

.back-button:hover { background: #eef7fa; }
</style>
</head>

<body>

<header>
  <h1>Measure Selection</h1>
  <div id="reach-display"></div>
  <div id="problem-display"></div>
</header>

<div id="context-panel" class="context-panel">
  <div class="context-title">Context filters</div>
  <div class="context-question-row">
    <span class="context-question-title">Is the reach impounded?</span>
    <div class="radio-row">
      <label class="radio-pill"><input type="radio" name="context-impounded" value="yes"> Yes</label>
      <label class="radio-pill"><input type="radio" name="context-impounded" value="no"> No</label>
    </div>
  </div>
  <div class="context-question-row">
    <span class="context-question-title">Is there a barrier upstream or downstream?</span>
    <div class="radio-row">
      <label class="radio-pill"><input type="radio" name="context-barrier" value="yes"> Yes</label>
      <label class="radio-pill"><input type="radio" name="context-barrier" value="no"> No</label>
    </div>
  </div>
  <div class="context-actions">
    <button class="secondary-button" id="context-continue-button" onclick="continueAfterContextQuestions()">Continue</button>
    <span class="context-note">Answer both questions to filter the suggested measures.</span>
  </div>
</div>

<button class="edit-answers-button hidden" id="edit-context-button" onclick="reopenContextPanel()">
  Change impounded / barrier answers
</button>

<div class="layout" id="refinement-layout">

  <div class="panel-left">
    <div class="panel-header">Suggested measures</div>
    <div class="list-scroll" id="measure-list">
      <div class="empty-state">Loading active problems...</div>
    </div>
  </div>

  <div class="panel-right">
    <div class="panel-header">
      <span>Selected</span>
      <span class="selected-count" id="selected-count">0</span>
    </div>

    <div class="list-scroll" id="selected-list">
      <div class="empty-state">No measures selected yet.</div>
    </div>

    <div class="footer">
      <button class="confirm-button" id="confirm-button" onclick="confirmSelection()">
        Confirm selection
      </button>
      <div class="status-message" id="status-message"></div>
    </div>
  </div>

</div>

<div id="assignment-dashboard" class="assignment-dashboard hidden">
  <div class="assignment-dashboard-header">
    <div class="assignment-dashboard-title">Assignment workflow</div>
    <button class="back-button" type="button" onclick="goBackToRefinement()">Back to selected measures</button>
  </div>
  <div id="assignment-tabs" class="assignment-tabs"></div>
  <div class="assignment-body">
    <div id="assignment-list-panel" class="assignment-list-panel"></div>
    <div id="assignment-tool-panel" class="assignment-tool-panel"></div>
  </div>
</div>

<script>
/* ------------------------------------------------------------------
   CONFIGURATION

   REQUIRED CHANGES BEFORE PUBLISHING:
   1. Replace REACH_PROBLEM_LAYER_URL with the REST URL of the hosted
      feature layer/table that stores one row per reach and the 56
      problem fields.
   2. SELECTED_MEASURES_TABLE_URL should point to the hosted table where
      the refined measure selections are stored.
   3. FIELD_PROBLEM_REACH_ID must exist in the reach-problem layer.
   4. FIELD_SELECTED_REACH_ID must exist in the selected-measures table.
   5. Problem fields in the reach-problem layer should use the same names
      as the matrix problem IDs, for example c_1_1, r_1_2, etc.
   6. Problem values used for suggestions are 1 and 2.
------------------------------------------------------------------ */

/* ------------------------------------------------------------------
   COUNTRY CONFIGURATION

   This lets ONE HTML file serve multiple Danube countries.
   Which country is active is decided purely by the ?country=XX
   parameter in the URL (e.g. ?country=CZ or ?country=SK).

   Add a new entry here whenever a new country's tables/layers exist.
   Only the 5 URLs that differ per country need to be listed —
   everything else in CONFIG (field names, labels, rules) stays the
   same for every country.
------------------------------------------------------------------ */
var COUNTRY_CONFIGS = {
  "CZ": {
    REACH_PROBLEM_LAYER_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/CZtest_data/FeatureServer/0",
    SELECTED_MEASURES_TABLE_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Reach_Selected_Measures/FeatureServer/0",
    MEASURE_STATUS_LAYER_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Measures_reach_test/FeatureServer/0",
    ASSIGNMENT_SESSION_TABLE_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Measure_Assignment_Session/FeatureServer/0",
    DAM_MEASURES_LAYER_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Dam_Measures_Updated/FeatureServer/0"
  },
  "SK": {
    // TODO: replace these 5 placeholders once the SK layers/tables exist in ArcGIS Online.
    REACH_PROBLEM_LAYER_URL: "PASTE_SK_REACH_PROBLEM_LAYER_URL_HERE",
    SELECTED_MEASURES_TABLE_URL: "PASTE_SK_SELECTED_MEASURES_TABLE_URL_HERE",
    MEASURE_STATUS_LAYER_URL: "PASTE_SK_MEASURE_STATUS_LAYER_URL_HERE",
    ASSIGNMENT_SESSION_TABLE_URL: "PASTE_SK_ASSIGNMENT_SESSION_TABLE_URL_HERE",
    DAM_MEASURES_LAYER_URL: "PASTE_SK_DAM_MEASURES_LAYER_URL_HERE"
  }
};

// Reads ?country=XX from the page URL (case-insensitive, trims stray
// spaces the same way getReachIdFromUrl() does for reach_id).
// Returns "" if no country parameter was supplied at all.
function getCountryCode() {
  var params = new URLSearchParams(window.location.search);
  var raw = params.get("country") || params.get("Country") || params.get("COUNTRY") || "";
  return String(raw).replace(/\u00a0/g, " ").trim().toUpperCase();
}

// Looks up the country code in COUNTRY_CONFIGS and overwrites just
// those 5 keys inside the shared CONFIG object. Everything else in
// CONFIG (field names, rules, labels) is left untouched.
// Must run BEFORE initialise(), so the very first query already
// targets the correct country's tables.
// If the country code doesn't match any entry (missing/typo'd
// ?country= parameter), CONFIG simply keeps its original hard-coded
// values (currently the CZ URLs) and a warning is logged to the
// console so it's easy to spot during testing.
function applyCountryConfig(config) {
  var code = getCountryCode();
  var override = COUNTRY_CONFIGS[code];

  if (!override) {
    console.warn("No country config found for '" + code + "'. Using base CONFIG values (currently CZ defaults).");
    return code;
  }

  Object.keys(override).forEach(function(key) {
    config[key] = override[key];
  });

  return code;
}

var CONFIG = {
  REACH_PROBLEM_LAYER_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/CZtest_data/FeatureServer/0",

  SELECTED_MEASURES_TABLE_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Reach_Selected_Measures/FeatureServer/0",

  // Optional but recommended:
  // This layer is a copy of the reach layer with one field per measure
  // named like D4A_01, D4A_02, etc. On confirm, only fields that actually exist in this layer are updated.
  MEASURE_STATUS_LAYER_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Measures_reach_test/FeatureServer/0",

  REACH_PROBLEM_TOKEN: "",
  SELECTED_MEASURES_TOKEN: "",
  MEASURE_STATUS_TOKEN: "",

  // Session table used to keep the active reach and assignment group alive
  // even when the map selection changes while the user edits dikes/groynes/barriers.
  ASSIGNMENT_SESSION_TABLE_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Measure_Assignment_Session/FeatureServer/0",
  ASSIGNMENT_SESSION_TOKEN: "",
  DEFAULT_SESSION_ID: "default",
  FIELD_SESSION_ID: "session_id",
  FIELD_SESSION_ACTIVE_REACH_ID: "active_reach_id",
  FIELD_SESSION_ACTIVE_ASSIGNMENT_GROUP: "active_assignment_group",
  FIELD_SESSION_ACTIVE_ASSIGNMENT_TARGET: "active_assignment_target",
  FIELD_SESSION_ACTIVE_GEOMETRY_TYPE: "active_geometry_type",
  FIELD_SESSION_WORKFLOW_STATUS: "workflow_status",
  FIELD_SESSION_UPDATED_AT: "updated_at",
  FIELD_SESSION_ACTIVE_EDIT_TOOL: "active_edit_tool",
  FIELD_SESSION_ACTIVE_MEASURE_IDS: "active_measure_ids",
  FIELD_SESSION_ACTIVE_MEASURE_COUNT: "active_measure_count",

  // Dam/barrier point layer used for automatic assignment of selected
  // dam/barrier measures D4A_001-D4A_014, D4A_027-D4A_038 and D4A_052-D4A_057.
  DAM_MEASURES_LAYER_URL: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Dam_Measures_Updated/FeatureServer/0",
  DAM_MEASURES_TOKEN: "",
  DAM_MEASURES_LAYER_NAME: "Dam_Measures_Updated",
  // For automatic dam/barrier assignment, prefer the downstream/start barrier,
  // then a barrier inside the reach. Do not fall back to D4A_ID_END, because
  // reaches are digitised downstream → upstream and END represents the upstream end.
  FIELD_DAM_REACH_ID_START: "D4A_ID_START",
  FIELD_DAM_REACH_ID_MIDDLE: "D4A_ID_MIDDLE",
  FIELD_DAM_REACH_ID_END: "D4A_ID_END",
  AUTO_ASSIGN_DAM_MEASURES_TO_BARRIER_LAYER: true,

  // true = keep the dam/barrier layer synchronized with the current selection.
  // Selected dam/barrier measures become 1; unselected dam/barrier measures
  // in the same measure set become 0 on the matched barrier feature.
  RESET_UNSELECTED_DAM_MEASURE_FIELDS_TO_ZERO: true,

  UPDATE_ONLY_CURRENT_REACH: true,
  USE_EXISTING_SELECTION_IF_AVAILABLE: true,

  // Field used to find the selected reach in the reach/problem layer
  FIELD_PROBLEM_REACH_ID: "D4A_ID",

  // Field used to store/load the reach ID in the selected-measures table
  FIELD_SELECTED_REACH_ID: "reach_id",

  // Field used to find the selected reach in the measure-status layer
  // Usually this should be the same field as the problem layer, e.g. D4A_ID.
  FIELD_MEASURE_STATUS_REACH_ID: "D4A_ID",

  // ObjectID field in the measure-status layer. Usually OBJECTID.
  FIELD_MEASURE_STATUS_OBJECTID: "OBJECTID",

  // true = after confirm, selected measure fields that exist in the target layer become 1
  // and existing non-selected D4A fields become 0.
  // The script matches internal IDs D4A_001..D4A_093 to layer fields D4A_01..D4A_93.
  // D4A fields that do not exist in the target layer are ignored safely.
  RESET_UNSELECTED_MEASURE_FIELDS_TO_ZERO: true,

  ACTIVE_PROBLEM_VALUES: [1, 2],

  FIELD_MEASURE_ID: "measure_id",
  FIELD_MEASURE_NAME: "measure_name",
  FIELD_MEASURE_GROUP: "measure_group",
  FIELD_SELECTED_AT: "selected_at",
  FIELD_SELECTION_STATUS: "selection_status",

  // Optional field in the reach/problem layer.
  // Values can be 1/0, yes/no, true/false, or impounded/not_impounded.
  // It can also be supplied in the URL as ?is_impounded=1 or ?impounded=yes.
  FIELD_REACH_IS_IMPOUNDED: "is_impounded",
  USE_IMPOUNDMENT_FILTER: true,

  // Assignment workflow fields in the selected-measures table.
  // These allow later tools to show only measures that still need spatial assignment.
  FIELD_ASSIGNMENT_GROUP: "assignment_group",
  FIELD_ASSIGNMENT_TARGET: "assignment_target",
  FIELD_GEOMETRY_TYPE: "geometry_type",
  FIELD_ASSIGNMENT_MODE: "assignment_mode",
  FIELD_ASSIGNMENT_STATUS: "assignment_status",
  FIELD_ASSIGNED_FEATURE_ID: "assigned_feature_id",
  FIELD_ASSIGNED_LAYER: "assigned_layer",
  FIELD_ASSIGNED_AT: "assigned_at",
  FIELD_EXCLUSION_REASON: "exclusion_reason",

  FIELD_GROUP_ORDER: "group_order",
  FIELD_ASSIGNMENT_NOTES: "assignment_notes",
  FIELD_FILTER_IMPOUNDED_ANSWER: "filter_impounded_answer",
  FIELD_FILTER_BARRIER_ANSWER: "filter_barrier_answer",

  // Assessment tracking fields in the reach/problem layer.
  // These fields drive Experience Builder symbology, filters and progress lists.
  FIELD_ASSESSMENT_STATUS: "assessment_status",
  FIELD_ASSESSMENT_DATE: "assessment_date",
  FIELD_SELECTED_MEASURE_COUNT: "selected_measure_count",
  FIELD_ASSIGNED_MEASURE_COUNT: "assigned_measure_count",

var selected = {};
var suggestedMeasureIds = [];
var unfilteredSuggestedMeasureIds = [];
var measureStatusLayerInfoCache = null;
var selectedMeasuresTableInfoCache = null;
var assignmentSessionTableInfoCache = null;
var damMeasuresLayerInfoCache = null;
var activeProblemIds = [];

var assignmentRecords = [];
var activeAssignmentGroup = null;

/* ------------------------------------------------------------------
   INITIALISE
------------------------------------------------------------------ */
var activeCountryCode = applyCountryConfig(CONFIG);
initialise();

async function initialise() {
  showCurrentReach();

  var reachId = getReachIdFromUrl();

  if (!reachId) {
    setStatus("No reach_id was found in the URL. Open this page with ?reach_id=YOUR_REACH_ID.", "error");
    setEmptyMeasureList("No reach selected.");
    return;
  }

  if (!isUrlConfigured(CONFIG.REACH_PROBLEM_LAYER_URL)) {
    setStatus("REACH_PROBLEM_LAYER_URL has not been configured in the script.", "error");
    setEmptyMeasureList("Reach problem layer is not configured.");
    return;
  }

  if (!isUrlConfigured(CONFIG.SELECTED_MEASURES_TABLE_URL)) {
    setStatus("SELECTED_MEASURES_TABLE_URL has not been configured in the script.", "error");
    setEmptyMeasureList("Selected measures table is not configured.");
    return;
  }

  try {
    setStatus("Loading problems for reach " + reachId + "...", "");

    reachProblemAttributes = await queryReachProblemAttributes(reachId);
    currentReachIsImpounded = getReachImpoundmentStatus(reachProblemAttributes);
    currentReachHasBarrierContext = getReachBarrierContextStatus(reachProblemAttributes);

    activeProblemIds = getActiveProblemIdsFromAttributes(reachProblemAttributes);
    activeProblemDetails = getProblemDetails(activeProblemIds);
    unfilteredSuggestedMeasureIds = getSuggestedMeasureIds(activeProblemIds);
    suggestedMeasureIds = [];
    selected = {};

    prefillContextQuestions();
    updateProblemDisplay();
    setEmptyMeasureList("Answer the context questions above to display the refined suggested measures.");
    updateSelectedList();
    await safeSetActiveWorkflowReach(reachId);
    await safeUpdateAssignmentSessionRefinement(reachId);

    var contextMessage = "Loaded " + activeProblemIds.length + " active problem field(s) for reach " + reachId + ".";
    if (currentReachIsImpounded !== null || currentReachHasBarrierContext !== null) {
      contextMessage += " Previously saved context answers were loaded where available. You can change them before continuing.";
    } else {
      contextMessage += " Answer the context questions to filter the suggested measures.";
    }
    setStatus(contextMessage, "success");

  } catch (error) {
    console.error(error);
    setStatus("Could not initialise measure selection: " + error.message, "error");
    setEmptyMeasureList("Could not load suggested measures.");
  }
}

function prefillContextQuestions() {
  if (currentReachIsImpounded === true) {
    setRadioValue("context-impounded", "yes");
  } else if (currentReachIsImpounded === false) {
    setRadioValue("context-impounded", "no");
  }

  if (currentReachHasBarrierContext === true) {
    setRadioValue("context-barrier", "yes");
  } else if (currentReachHasBarrierContext === false) {
    setRadioValue("context-barrier", "no");
  }
}

async function continueAfterContextQuestions() {
  var impoundedValue = getRadioValue("context-impounded");
  var barrierValue = getRadioValue("context-barrier");

  if (!impoundedValue || !barrierValue) {
    setStatus("Please answer both context questions before continuing.", "error");
    return;
  }

  hideContextPanel();

  currentReachIsImpounded = impoundedValue === "yes";
  currentReachHasBarrierContext = barrierValue === "yes";

  suggestedMeasureIds = filterMeasureIdsByContext(
    unfilteredSuggestedMeasureIds,
    currentReachIsImpounded,
    currentReachHasBarrierContext
  );

  updateProblemDisplay();
  await safeUpdateAssignmentSessionRefinement(getReachIdFromUrl());
  buildMeasureList(suggestedMeasureIds);
  selected = {};

  if (suggestedMeasureIds.length === 0) {
    updateSelectedList();
    setStatus("No suggested measures remain after the context filters were applied.", "");
    return;
  }

  if (CONFIG.USE_EXISTING_SELECTION_IF_AVAILABLE) {
    try {
      var existingMeasureIds = await queryMeasureIdsForReach(getReachIdFromUrl());
      if (existingMeasureIds.length > 0) {
        applyExistingSelection(existingMeasureIds);
      }
    } catch (error) {
      console.warn("Existing selection could not be loaded after context filtering.", error);
    }
  }

  refreshCheckedStates();
  updateSelectedList();
  setStatus(
    "Displayed " + suggestedMeasureIds.length + " suggested measure(s) after applying context filters. Select the measures you want to keep.",
    "success"
  );
}

function getRadioValue(name) {
  var checked = document.querySelector("input[name='" + name + "']:checked");
  return checked ? checked.value : null;
}

function setRadioValue(name, value) {
  var input = document.querySelector("input[name='" + name + "'][value='" + value + "']");
  if (input) { input.checked = true; }
}

function hideContextPanel() {
  document.getElementById("context-panel").classList.add("hidden");
  document.getElementById("edit-context-button").classList.remove("hidden");
}

function reopenContextPanel() {
  document.getElementById("context-panel").classList.remove("hidden");
  document.getElementById("edit-context-button").classList.add("hidden");
}

/* ------------------------------------------------------------------
   BUILD MEASURE LIST
------------------------------------------------------------------ */

function buildMeasureList(measureIdsToDisplay) {
  var measureIdSet = {};

  measureIdsToDisplay.forEach(function(id) {
    measureIdSet[id] = true;
  });

  var measuresToDisplay = MEASURES.filter(function(m) {
    return measureIdSet[m.id] === true;
  });

  if (measuresToDisplay.length === 0) {
    setEmptyMeasureList("No suggested measures for this reach.");
    return;
  }

  var groups = {};
  var groupOrder = [];

  measuresToDisplay.forEach(function(m) {
    if (!groups[m.group]) {
      groups[m.group] = [];
      groupOrder.push(m.group);
    }
    groups[m.group].push(m);
  });

  var container = document.getElementById("measure-list");
  container.innerHTML = "";

  groupOrder.forEach(function(gname) {
    var gh = document.createElement("div");
    gh.className = "group-header";
    gh.innerHTML = '<span class="group-label">' + escapeHtml(gname) + '</span>';
    container.appendChild(gh);

    groups[gname].forEach(function(m) {
      var el = document.createElement("div");
      el.className = "measure-item";
      el.setAttribute("data-measure-id", m.id);

      el.innerHTML =
        '<input type="checkbox">' +
        '<span class="measure-id">' + escapeHtml(m.id) + '</span>' +
        '<span class="measure-name">' + escapeHtml(m.name) + '</span>';

      el.addEventListener("click", function() {
        toggleMeasure(m.id);
      });

      container.appendChild(el);
    });
  });
}

function setEmptyMeasureList(message) {
  var container = document.getElementById("measure-list");
  container.innerHTML = '<div class="empty-state">' + escapeHtml(message) + '</div>';
}

/* ------------------------------------------------------------------
   PROBLEM-TO-MEASURE LOGIC
------------------------------------------------------------------ */

function getActiveProblemIdsFromAttributes(attributes) {
  var active = [];

  PROBLEMS.forEach(function(problem) {
    var value = getAttributeCaseInsensitive(attributes, problem.id);

    if (isActiveProblemValue(value)) {
      active.push(problem.id);
    }
  });

  return active;
}

function isActiveProblemValue(value) {
  if (value === null || value === undefined) {
    return false;
  }

  var numericValue = Number(value);

  return CONFIG.ACTIVE_PROBLEM_VALUES.indexOf(numericValue) !== -1;
}

function getSuggestedMeasureIds(problemIds) {
  var suggested = {};

  problemIds.forEach(function(problemId) {
    var ids = PROBLEM_MEASURE_LOOKUP[normaliseProblemId(problemId)] || [];

    ids.forEach(function(measureId) {
      suggested[measureId] = true;
    });
  });

  return Object.keys(suggested).sort(function(a, b) {
    return getMeasureNumber(a) - getMeasureNumber(b);
  });
}

function getProblemDetails(problemIds) {
  var problemIdSet = {};

  problemIds.forEach(function(id) {
    problemIdSet[normaliseProblemId(id)] = true;
  });

  return PROBLEMS.filter(function(p) {
    return problemIdSet[p.id] === true;
  });
}

function updateProblemDisplay() {
  var el = document.getElementById("problem-display");

  if (!el) { return; }

  var impoundmentText = getImpoundmentDisplayText() + getBarrierDisplayText();

  if (activeProblemIds.length === 0) {
    el.textContent = "Active problems: 0" + impoundmentText;
  } else {
    el.textContent = "Active problems: " + activeProblemIds.length + " | Suggested measures: " + suggestedMeasureIds.length + impoundmentText;
  }
}

/* ------------------------------------------------------------------
   SELECTION LOGIC
------------------------------------------------------------------ */

function setSuggestedMeasuresAsSelected() {
  selected = {};

  suggestedMeasureIds.forEach(function(id) {
    var measure = getMeasureById(id);

    if (measure) {
      selected[id] = measure;
    }
  });
}

function applyExistingSelection(existingMeasureIds) {
  var suggestedSet = {};
  suggestedMeasureIds.forEach(function(id) { suggestedSet[id] = true; });

  selected = {};

  existingMeasureIds.forEach(function(id) {
    if (suggestedSet[id] === true) {
      var measure = getMeasureById(id);

      if (measure) {
        selected[id] = measure;
      }
    }
  });
}

function toggleMeasure(measureId) {
  var measure = getMeasureById(measureId);

  if (!measure) { return; }

  if (selected[measureId]) {
    delete selected[measureId];
  } else {
    selected[measureId] = measure;
  }

  refreshCheckedStates();
  updateSelectedList();
}

function refreshCheckedStates() {
  var items = document.querySelectorAll(".measure-item");

  items.forEach(function(item) {
    var measureId = item.getAttribute("data-measure-id");
    var checkbox = item.querySelector("input[type='checkbox']");

    if (selected[measureId]) {
      item.classList.add("checked");
      checkbox.checked = true;
    } else {
      item.classList.remove("checked");
      checkbox.checked = false;
    }
  });
}

function updateSelectedList() {
  var keys = Object.keys(selected).sort(function(a, b) {
    return getMeasureNumber(a) - getMeasureNumber(b);
  });

  var list = document.getElementById("selected-list");
  document.getElementById("selected-count").textContent = keys.length;

  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-state">No measures selected yet.</div>';
    return;
  }

  list.innerHTML = "";

  keys.forEach(function(id) {
    var m = selected[id];
    var el = document.createElement("div");
    el.className = "selected-item";

    el.innerHTML =
      '<span class="sid">' + escapeHtml(m.id) + '</span>' +
      '<span class="sname">' + escapeHtml(m.name) + '</span>';

    list.appendChild(el);
  });
}

/* ------------------------------------------------------------------
   CURRENT REACH
------------------------------------------------------------------ */

function getReachIdFromUrl() {
  var params = new URLSearchParams(window.location.search);

  var rawValue = (
    params.get("reach_id") ||
    params.get("Reach_ID") ||
    params.get("REACH_ID") ||
    params.get("segment_id") ||
    params.get("id")
  );

  if (rawValue === null || rawValue === undefined) {
    return null;
  }

  // Experience Builder URL parameters can sometimes include leading/trailing
  // spaces or non-breaking spaces. Trim them before using the value in
  // ArcGIS REST where clauses.
  var cleanedValue = String(rawValue)
    .replace(/\u00a0/g, " ")
    .trim();

  return cleanedValue.length > 0 ? cleanedValue : null;
}

function showCurrentReach() {
  var reachId = getReachIdFromUrl();
  var el = document.getElementById("reach-display");

  if (!el) { return; }

  if (reachId) {
    el.textContent = "Current reach: " + reachId;
  } else {
    el.textContent = "No reach selected";
  }
}

/* ------------------------------------------------------------------
   QUERY REACH PROBLEM FEATURE
------------------------------------------------------------------ */

async function queryReachProblemAttributes(reachId) {
  var url = CONFIG.REACH_PROBLEM_LAYER_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_PROBLEM_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("outFields", "*");
  formData.append("returnGeometry", "false");
  formData.append("resultRecordCount", "1");

  if (CONFIG.REACH_PROBLEM_TOKEN) {
    formData.append("token", CONFIG.REACH_PROBLEM_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while querying reach problem layer: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from reach problem layer.");
  }

  if (!result.features || result.features.length === 0) {
    throw new Error("No row found in the reach problem layer for " + CONFIG.FIELD_PROBLEM_REACH_ID + " = " + reachId + ".");
  }

  return result.features[0].attributes || {};
}

   LOAD EXISTING SELECTIONS FOR CURRENT REACH
------------------------------------------------------------------ */

async function queryMeasureIdsForReach(reachId) {
  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_SELECTED_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("outFields", CONFIG.FIELD_MEASURE_ID);
  formData.append("returnGeometry", "false");

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while loading existing selection: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from selected measures table.");
  }

  if (!result.features) { return []; }

  return result.features
    .map(function(feature) {
      return feature.attributes[CONFIG.FIELD_MEASURE_ID];
    })
    .filter(function(id) {
      return id !== null && id !== undefined && String(id).length > 0;
    });
}

/* ------------------------------------------------------------------
   CONFIRM SELECTION
------------------------------------------------------------------ */

async function confirmSelection() {
  clearStatus();

  var reachId = getReachIdFromUrl();
  var keys = Object.keys(selected).sort(function(a, b) {
    return getMeasureNumber(a) - getMeasureNumber(b);
  });

  if (!reachId) {
    setStatus("No reach_id was found in the URL. Open this page with ?reach_id=YOUR_REACH_ID.", "error");
    return;
  }

  if (currentReachIsImpounded === null || currentReachHasBarrierContext === null) {
    setStatus("Answer the two context questions and continue before confirming the selection.", "error");
    return;
  }

  if (suggestedMeasureIds.length === 0) {
    setStatus("No suggested measures are available after the context filters were applied.", "error");
    return;
  }

  // A reach can be confirmed with zero selected measures.
  // This means: the reach has been assessed, but the user decided not to keep
  // any of the suggested measures. In that case the script clears previous
  // selected-measure rows, resets the automatic reach/barrier measure fields,
  // and updates the reach assessment status to fully assigned / no pending work.

  var confirmButton = document.getElementById("confirm-button");
  confirmButton.disabled = true;
  confirmButton.textContent = "Saving...";

  try {
    if (CONFIG.UPDATE_ONLY_CURRENT_REACH) {
      await deleteExistingRowsForReach(reachId);
    }

    assignmentRecords = keys.map(function(id, index) {
      var m = selected[id];
      var now = Date.now();
      var rule = getAssignmentRuleForMeasure(m.id);
      var assignmentInfo = getInitialAssignmentInfoForMeasure(m.id, rule, reachId, now);
      var groupOrder = getAssignmentGroupOrder(assignmentInfo.assignment_group);

      return {
        objectId: null,
        measure_id: m.id,
        measure_name: m.name,
        measure_group: m.group,
        assignment_group: assignmentInfo.assignment_group,
        assignment_target: assignmentInfo.assignment_target,
        geometry_type: assignmentInfo.geometry_type,
        assignment_mode: assignmentInfo.assignment_mode,
        assignment_status: assignmentInfo.assignment_status,
        assigned_feature_id: assignmentInfo.assigned_feature_id,
        assigned_layer: assignmentInfo.assigned_layer,
        assigned_at: assignmentInfo.assigned_at,
        selected_at: now,
        selection_status: "selected",
        exclusion_reason: null,
        group_order: groupOrder,
        assignment_notes: "",
        filter_impounded_answer: currentReachIsImpounded ? "yes" : "no",
        filter_barrier_answer: currentReachHasBarrierContext ? "yes" : "no"
      };
    });

    var damAutoAssignMessage = "";
    if (CONFIG.AUTO_ASSIGN_DAM_MEASURES_TO_BARRIER_LAYER) {
      damAutoAssignMessage = await autoAssignDamMeasuresToBarrierLayer(reachId, assignmentRecords);
    }

    var features = assignmentRecords.map(function(record) {
      var attributes = {};

      attributes[CONFIG.FIELD_SELECTED_REACH_ID] = reachId;
      attributes[CONFIG.FIELD_MEASURE_ID] = record.measure_id;
      attributes[CONFIG.FIELD_MEASURE_NAME] = record.measure_name;
      attributes[CONFIG.FIELD_MEASURE_GROUP] = record.measure_group;
      attributes[CONFIG.FIELD_SELECTED_AT] = record.selected_at;
      attributes[CONFIG.FIELD_SELECTION_STATUS] = record.selection_status;

      attributes[CONFIG.FIELD_ASSIGNMENT_GROUP] = record.assignment_group;
      attributes[CONFIG.FIELD_ASSIGNMENT_TARGET] = record.assignment_target;
      attributes[CONFIG.FIELD_GEOMETRY_TYPE] = record.geometry_type;
      attributes[CONFIG.FIELD_ASSIGNMENT_MODE] = record.assignment_mode;
      attributes[CONFIG.FIELD_ASSIGNMENT_STATUS] = record.assignment_status;
      attributes[CONFIG.FIELD_ASSIGNED_FEATURE_ID] = record.assigned_feature_id;
      attributes[CONFIG.FIELD_ASSIGNED_LAYER] = record.assigned_layer;
      attributes[CONFIG.FIELD_ASSIGNED_AT] = record.assigned_at;
      attributes[CONFIG.FIELD_EXCLUSION_REASON] = record.exclusion_reason;
      attributes[CONFIG.FIELD_GROUP_ORDER] = record.group_order;
      attributes[CONFIG.FIELD_ASSIGNMENT_NOTES] = record.assignment_notes;
      attributes[CONFIG.FIELD_FILTER_IMPOUNDED_ANSWER] = record.filter_impounded_answer;
      attributes[CONFIG.FIELD_FILTER_BARRIER_ANSWER] = record.filter_barrier_answer;

      return { attributes: attributes };
    });

    if (features.length > 0) {
      var addResult = await addSelectedRows(features);

      if (!allAddsSuccessful(addResult)) {
        console.error(addResult);
        setStatus("The request was sent, but one or more rows were not saved. Check the browser console.", "error");
        return;
      }

      if (addResult && addResult.addResults) {
        addResult.addResults.forEach(function(result, index) {
          if (assignmentRecords[index]) {
            assignmentRecords[index].objectId = result.objectId || result.objectid || result.OBJECTID || null;
          }
        });
      }
    }

    var pendingText = getPendingAssignmentSummaryTextFromRecords(assignmentRecords);

    var statusParts = ["Selection saved for reach " + reachId + "."];

    if (isUrlConfigured(CONFIG.MEASURE_STATUS_LAYER_URL)) {
      await updateMeasureStatusLayerForReach(reachId, keys);
      statusParts.push("Automatic reach-level measure-status fields were updated.");
    } else {
      statusParts.push("Measure-status layer URL is not configured, so D4A fields were not updated.");
    }

    if (damAutoAssignMessage) {
      statusParts.push(damAutoAssignMessage);
    }

    await updateReachAssessmentStatusForCurrentState(reachId, null);
    statusParts.push("Reach assessment progress was updated.");

    if (keys.length === 0) {
      statusParts.unshift("No measures were kept for this reach; previous selections and automatic measure fields were cleared.");
    }

    setStatus(statusParts.join(" ") + pendingText, "success");

    if (assignmentRecords.length > 0) {
      showAssignmentDashboard();
    } else {
      await safeUpdateAssignmentSessionCompleted(reachId);
      document.getElementById("assignment-dashboard").classList.add("hidden");
      document.getElementById("context-panel").classList.remove("hidden");
      document.getElementById("refinement-layout").classList.remove("hidden");
      updateSelectedList();
    }

  } catch (error) {
    console.error(error);
    setStatus("Saving failed: " + error.message, "error");

  } finally {
    confirmButton.disabled = false;
    confirmButton.textContent = "Confirm selection";
  }
}

------------------------------------------------------------------ */

async function addSelectedRows(features) {
  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/addFeatures";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("features", JSON.stringify(features));

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while adding rows: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS addFeatures error.");
  }

  return result;
}

async function deleteExistingRowsForReach(reachId) {
  var objectIds = await queryObjectIdsForReach(reachId);

  if (objectIds.length === 0) { return; }

  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/deleteFeatures";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("objectIds", objectIds.join(","));

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while deleting existing rows: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS deleteFeatures error.");
  }

  return result;
}

async function queryObjectIdsForReach(reachId) {
  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_SELECTED_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();

function isDamMeasureId(measureId) {
  var number = getMeasureNumber(normalizeMeasureId(measureId));

  return (
    (number >= 1 && number <= 14) ||
    (number >= 27 && number <= 38) ||
    (number >= 52 && number <= 57)
  );
}

function getDamMeasureRecords(records) {
  return records.filter(function(record) {
    return isDamMeasureId(record.measure_id);
  });
}

async function autoAssignDamMeasuresToBarrierLayer(reachId, records) {
  var damRecords = getDamMeasureRecords(records);

  // Even if no dam/barrier measures are currently selected, we still update
  // the matched barrier feature when RESET_UNSELECTED_DAM_MEASURE_FIELDS_TO_ZERO
  // is true. This keeps the barrier layer synchronized when a user reopens a
  // reach, unticks a previously selected dam/barrier measure, and confirms again.
  if (damRecords.length === 0 && !CONFIG.RESET_UNSELECTED_DAM_MEASURE_FIELDS_TO_ZERO) {
    return "";
  }

  if (!isUrlConfigured(CONFIG.DAM_MEASURES_LAYER_URL)) {
    if (damRecords.length > 0) {
      return "Warning: dam/barrier measures were selected, but DAM_MEASURES_LAYER_URL is not configured, so they remain pending.";
    }
    return "";
  }

  var match = await findDamBarrierFeaturesForReach(reachId);

  if (!match || !match.objectIds || match.objectIds.length === 0) {
    damRecords.forEach(function(record) {
      record.assignment_notes = "No matching downstream or within-reach barrier point found for reach " + reachId + " in " + CONFIG.FIELD_DAM_REACH_ID_START + " or " + CONFIG.FIELD_DAM_REACH_ID_MIDDLE + ".";
    });

    if (damRecords.length > 0) {
      return "Warning: " + damRecords.length + " dam/barrier measure(s) could not be automatically assigned because no downstream or within-reach barrier point matched " + reachId + " in " + CONFIG.FIELD_DAM_REACH_ID_START + " or " + CONFIG.FIELD_DAM_REACH_ID_MIDDLE + ".";
    }

    return "";
  }

  var layerInfo = await getDamMeasuresLayerInfo();
  var objectIdField = layerInfo.objectIdField || "OBJECTID";
  var existingD4AFields = getExistingD4AFieldsFromLayerInfo(layerInfo);

  if (existingD4AFields.length === 0) {
    return "Warning: a matching barrier point was found, but the dam/barrier layer does not contain D4A measure fields to update.";
  }

  var fieldLookup = {};
  existingD4AFields.forEach(function(fieldName) {
    fieldLookup[normalizeMeasureId(fieldName)] = fieldName;
  });

  var selectedDamMeasureSet = {};
  damRecords.forEach(function(record) {
    selectedDamMeasureSet[normalizeMeasureId(record.measure_id)] = true;
  });

  var damMeasureFieldNames = existingD4AFields.filter(function(fieldName) {
    return isDamMeasureId(fieldName);
  });

  var matchedSelectedFieldNames = [];
  var missingMeasureFields = [];

  damRecords.forEach(function(record) {
    var normalizedId = normalizeMeasureId(record.measure_id);

    if (fieldLookup[normalizedId]) {
      matchedSelectedFieldNames.push(fieldLookup[normalizedId]);
    } else {
      missingMeasureFields.push(record.measure_id);
    }
  });

  matchedSelectedFieldNames = Array.from(new Set(matchedSelectedFieldNames));

  if (damMeasureFieldNames.length === 0) {
    return "Warning: matching barrier point(s) were found, but no D4A dam/barrier measure fields exist in the dam/barrier layer.";
  }

  if (damRecords.length > 0 && matchedSelectedFieldNames.length === 0) {
    return "Warning: matching barrier point(s) were found, but none of the selected dam/barrier measure fields exist in the dam/barrier layer.";
  }

  var fieldsToUpdate;

  if (CONFIG.RESET_UNSELECTED_DAM_MEASURE_FIELDS_TO_ZERO) {
    // Full synchronization for the dam/barrier measure set:
    // selected dam/barrier measures become 1; unselected dam/barrier measures become 0.
    fieldsToUpdate = damMeasureFieldNames;
  } else {
    // Legacy behavior: only selected dam/barrier measures are set to 1.
    fieldsToUpdate = matchedSelectedFieldNames;
  }

  var features = match.objectIds.map(function(objectId) {
    var attributes = {};
    attributes[objectIdField] = objectId;

    fieldsToUpdate.forEach(function(fieldName) {
      var normalizedFieldName = normalizeMeasureId(fieldName);

      if (CONFIG.RESET_UNSELECTED_DAM_MEASURE_FIELDS_TO_ZERO) {
        attributes[fieldName] = selectedDamMeasureSet[normalizedFieldName] ? 1 : 0;
      } else if (selectedDamMeasureSet[normalizedFieldName]) {
        attributes[fieldName] = 1;
      }
    });

    return { attributes: attributes };
  });

  var updateResult = await updateDamBarrierFeatures(features);

  if (!allUpdatesSuccessful(updateResult)) {
    console.error("Dam/barrier updateFeatures result:", updateResult);
    throw new Error(buildGenericUpdateFeaturesErrorMessage(updateResult, "Dam/barrier measure update failed"));
  }

  var now = Date.now();
  var assignedFeatureId = match.objectIds.join(",");

  damRecords.forEach(function(record) {
    var normalizedId = normalizeMeasureId(record.measure_id);

    if (fieldLookup[normalizedId]) {
      record.assignment_status = CONFIG.ASSIGNMENT_STATUS_ASSIGNED;
      record.assigned_feature_id = assignedFeatureId;
      record.assigned_layer = CONFIG.DAM_MEASURES_LAYER_NAME || "Dam/barrier layer";
      record.assigned_at = now;
      record.assignment_notes = "Automatically assigned to barrier point(s) via " + match.matchedField + ".";
    } else {
      record.assignment_notes = "Matching barrier point found, but field " + record.measure_id + " was not found in dam/barrier layer.";
    }
  });

  if (damRecords.length === 0) {
    return "Dam/barrier layer synchronized: all dam/barrier measure fields on the matched barrier point(s) were reset to 0 using " + match.matchedField + ".";
  }

  var message = "Dam/barrier measures were automatically assigned to " + match.objectIds.length + " barrier point(s) using " + match.matchedField + ".";

  if (CONFIG.RESET_UNSELECTED_DAM_MEASURE_FIELDS_TO_ZERO) {
    message += " Unselected dam/barrier measure fields on the matched barrier point(s) were reset to 0.";
  }

  if (missingMeasureFields.length > 0) {
    message += " Warning: missing measure field(s) in dam/barrier layer: " + missingMeasureFields.join(", ") + ".";
  }

  return message;
}

async function findDamBarrierFeaturesForReach(reachId) {
  // Reaches are digitised downstream → upstream.
  // Therefore START is the downstream end of the reach and END is the upstream end.
  // For automatic barrier assignment we intentionally use:
  //   1. D4A_ID_START  = downstream barrier of the selected reach
  //   2. D4A_ID_MIDDLE = barrier located within the selected reach
  //   3. no D4A_ID_END fallback, because that would assign to the upstream barrier
  var startMatch = await queryDamBarrierObjectIdsByField(CONFIG.FIELD_DAM_REACH_ID_START, reachId);

  if (startMatch.length > 0) {
    return {
      objectIds: startMatch,
      matchedField: CONFIG.FIELD_DAM_REACH_ID_START
    };
  }

  var middleMatch = await queryDamBarrierObjectIdsByField(CONFIG.FIELD_DAM_REACH_ID_MIDDLE, reachId);

  if (middleMatch.length > 0) {
    return {
      objectIds: middleMatch,
      matchedField: CONFIG.FIELD_DAM_REACH_ID_MIDDLE
    };
  }

  return {
    objectIds: [],
    matchedField: null
  };
}

async function queryDamBarrierObjectIdsByField(fieldName, reachId) {
  var url = CONFIG.DAM_MEASURES_LAYER_URL.replace(/\/$/, "") + "/query";
  var where = fieldName + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("returnIdsOnly", "true");

  if (CONFIG.DAM_MEASURES_TOKEN) {
    formData.append("token", CONFIG.DAM_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while querying dam/barrier layer: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from dam/barrier layer.");
  }

  return result.objectIds || [];
}

async function getDamMeasuresLayerInfo() {
  if (damMeasuresLayerInfoCache) {
    return damMeasuresLayerInfoCache;
  }

  var url = CONFIG.DAM_MEASURES_LAYER_URL.replace(/\/$/, "");

  var formData = new FormData();
  formData.append("f", "json");

  if (CONFIG.DAM_MEASURES_TOKEN) {
    formData.append("token", CONFIG.DAM_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while reading dam/barrier layer metadata: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS metadata error from dam/barrier layer.");
  }

  if (!result.fields) {
    throw new Error("Could not read fields from the dam/barrier layer.");

  damMeasuresLayerInfoCache = result;
  return result;

function getExistingD4AFieldsFromLayerInfo(layerInfo) {
  return layerInfo.fields
    .map(function(field) { return field.name; })
    .filter(function(fieldName) {
      return /^D4A_\d{1,3}$/i.test(fieldName);
    });
}

async function updateDamBarrierFeatures(features) {
  var url = CONFIG.DAM_MEASURES_LAYER_URL.replace(/\/$/, "") + "/updateFeatures";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("features", JSON.stringify(features));

  if (CONFIG.DAM_MEASURES_TOKEN) {
    formData.append("token", CONFIG.DAM_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while updating dam/barrier layer: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS updateFeatures error for dam/barrier layer.");
  }

  return result;
}

function buildGenericUpdateFeaturesErrorMessage(result, prefix) {
  if (!result || !result.updateResults || result.updateResults.length === 0) {
    return prefix + ": ArcGIS updateFeatures returned no updateResults.";
  }

  var errors = result.updateResults
    .filter(function(r) { return r.success !== true; })
    .map(function(r, index) {
      if (!r.error) {
        return "Row " + (index + 1) + ": unsuccessful update with no ArcGIS error details.";
      }

      var parts = ["Row " + (index + 1)];
      if (r.error.code !== undefined) { parts.push("code " + r.error.code); }
      if (r.error.message) { parts.push(r.error.message); }
      if (r.error.description) { parts.push(r.error.description); }
      return parts.join(": ");
    });

  if (errors.length === 0) {
    return prefix + ": ArcGIS updateFeatures returned an unsuccessful result, but no detailed error was provided.";
  }

  return prefix + ": " + errors.join(" | ");
}

async function updateReachAssessmentStatusForCurrentState(reachId, lastAssignmentGroup) {

  }

  var counts = getAssignmentCountsForCurrentState();
  var now = Date.now();

  var url = CONFIG.REACH_PROBLEM_LAYER_URL.replace(/\/$/, "") + "/updateFeatures";
  var formData = new FormData();
  formData.append("f", "json");
  formData.append("features", JSON.stringify([{ attributes: attributes }]));

  if (CONFIG.REACH_PROBLEM_TOKEN) {
    formData.append("token", CONFIG.REACH_PROBLEM_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while updating reach assessment status: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS updateFeatures error from reach/problem layer.");

  if (!allUpdatesSuccessful(result)) {
    console.error("Reach assessment updateFeatures result:", result);
    throw new Error(buildGenericUpdateFeaturesErrorMessage(result, "Reach assessment update"));

async function safeSetActiveWorkflowReach(reachId) {

    return await setActiveWorkflowReach(reachId);

    console.warn("Active workflow reach highlight could not be updated.", error);
    return null;

}

async function setActiveWorkflowReach(reachId) {
  if (!reachId) { return null; }
  if (!isUrlConfigured(CONFIG.REACH_PROBLEM_LAYER_URL)) { return null; }
  if (!CONFIG.FIELD_ACTIVE_WORKFLOW || !CONFIG.FIELD_ACTIVE_SESSION_ID || !CONFIG.FIELD_ACTIVE_WORKFLOW_AT) {
    return null;
  }

  var sessionId = getSessionId();
  var now = Date.now();
  var objectIdFieldName = await getReachProblemObjectIdFieldName();
  var currentObjectIds = await queryReachProblemObjectIdsForReach(reachId);

  if (currentObjectIds.length === 0) {
    throw new Error("No matching reach found while setting active workflow highlight for " + reachId + ".");
  }

  var currentSet = {};
  currentObjectIds.forEach(function(objectId) {
    currentSet[String(objectId)] = true;
  });

  var previouslyActiveObjectIds = await queryActiveWorkflowReachObjectIdsForSession(sessionId);
  var features = [];

  previouslyActiveObjectIds.forEach(function(objectId) {
    if (currentSet[String(objectId)] === true) { return; }

    var attributes = {};
    attributes[objectIdFieldName] = objectId;
    attributes[CONFIG.FIELD_ACTIVE_WORKFLOW] = CONFIG.ACTIVE_WORKFLOW_OFF_VALUE;
    attributes[CONFIG.FIELD_ACTIVE_SESSION_ID] = "";
    attributes[CONFIG.FIELD_ACTIVE_WORKFLOW_AT] = now;
    features.push({ attributes: attributes });
  });

  currentObjectIds.forEach(function(objectId) {
    var attributes = {};
    attributes[objectIdFieldName] = objectId;
    attributes[CONFIG.FIELD_ACTIVE_WORKFLOW] = CONFIG.ACTIVE_WORKFLOW_ON_VALUE;
    attributes[CONFIG.FIELD_ACTIVE_SESSION_ID] = sessionId;
    attributes[CONFIG.FIELD_ACTIVE_WORKFLOW_AT] = now;
    features.push({ attributes: attributes });
  });

  if (features.length === 0) { return null; }

  return updateReachProblemFeatures(features, "Active workflow reach highlight");
}

function getAssignmentCountsForCurrentState() {
  var total = assignmentRecords.length;

  var pending = 0;

    if (record.assignment_status === CONFIG.ASSIGNMENT_STATUS_ASSIGNED) {
      assigned++;
    } else {
      pending++;
    }
  });

  return {
    total: total,
    assigned: assigned,
    pending: pending
  };

function getAssessedByFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var value =
    params.get("assessed_by") ||
    params.get("user") ||
    params.get("username") ||
    params.get("assessor");

  if (!value) { return ""; }

  return String(value).replace(/\u00a0/g, " ").trim();
}

function buildGenericUpdateFeaturesErrorMessage(result, prefix) {
  if (!result || !result.updateResults || result.updateResults.length === 0) {
    return prefix + " failed: ArcGIS updateFeatures returned no updateResults.";
  }

  var errors = result.updateResults
    .filter(function(r) { return r.success !== true; })
    .map(function(r) {
      if (!r.error) {
        return "Unsuccessful update with no ArcGIS error details.";
      }

      var parts = [];
      if (r.error.code !== undefined) { parts.push("code " + r.error.code); }
      if (r.error.message) { parts.push(r.error.message); }
      if (r.error.description) { parts.push(r.error.description); }

      return parts.join(": ");
    });

  if (errors.length === 0) {
    return prefix + " failed: ArcGIS updateFeatures returned an unsuccessful result, but no detailed error was provided.";
  }

  return prefix + " failed: " + errors.join(" | ");
}
