  var measureIdsForReachStatus = selectedMeasureIds;

  if (CONFIG.UPDATE_MEASURE_STATUS_WITH_AUTO_REACH_MEASURES_ONLY) {
    measureIdsForReachStatus = selectedMeasureIds.filter(function(id) {
      return shouldUpdateReachStatusForMeasure(id);
    });
  }

  var objectIds = await queryMeasureStatusObjectIdsForReach(reachId);

  if (objectIds.length === 0) {
    throw new Error("No matching row found in measure-status layer for reach " + reachId + ".");
  }

  if (objectIds.length > 1) {
    throw new Error("More than one matching row found in measure-status layer for reach " + reachId + ". The layer should contain only one row per reach.");
  }

  var layerInfo = await getMeasureStatusLayerInfo();
  var existingD4AFields = getExistingMeasureStatusD4AFieldsFromInfo(layerInfo);
  var objectIdFieldName = layerInfo.objectIdField || CONFIG.FIELD_MEASURE_STATUS_OBJECTID;

  if (existingD4AFields.length === 0) {
    throw new Error("The measure-status layer does not contain any D4A measure fields to update. Expected names like D4A_01, D4A_02, ... D4A_93.");
  }

  var selectedSet = {};
  measureIdsForReachStatus.forEach(function(id) {
    selectedSet[normalizeMeasureId(id)] = true;
  });

  var attributes = {};
  attributes[objectIdFieldName] = objectIds[0];

  existingD4AFields.forEach(function(fieldName) {
    var normalizedFieldName = normalizeMeasureId(fieldName);

    if (CONFIG.RESET_UNSELECTED_MEASURE_FIELDS_TO_ZERO) {
      attributes[fieldName] = selectedSet[normalizedFieldName] ? 1 : 0;
    } else if (selectedSet[normalizedFieldName]) {
      attributes[fieldName] = 1;
    }
  });

  var fieldUpdateCount = Object.keys(attributes).length - 1;

  if (fieldUpdateCount === 0) {
    throw new Error("No matching D4A measure fields were available to update in the measure-status layer.");
  }

  var url = CONFIG.MEASURE_STATUS_LAYER_URL.replace(/\/$/, "") + "/updateFeatures";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("features", JSON.stringify([{ attributes: attributes }]));

  if (CONFIG.MEASURE_STATUS_TOKEN) {
    formData.append("token", CONFIG.MEASURE_STATUS_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while updating measure-status layer: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS updateFeatures error for measure-status layer.");
  }

  if (!allUpdatesSuccessful(result)) {
    console.error("Measure-status updateFeatures result:", result);
    throw new Error(buildUpdateFeaturesErrorMessage(result));
  }

  return result;
}

async function getMeasureStatusLayerInfo() {
  if (measureStatusLayerInfoCache) {
    return measureStatusLayerInfoCache;
  }

  var url = CONFIG.MEASURE_STATUS_LAYER_URL.replace(/\/$/, "");

  var formData = new FormData();
  formData.append("f", "json");

  if (CONFIG.MEASURE_STATUS_TOKEN) {
    formData.append("token", CONFIG.MEASURE_STATUS_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while reading measure-status layer metadata: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS metadata error from measure-status layer.");
  }

  if (!result.fields) {
    throw new Error("Could not read fields from the measure-status layer.");
  }

  measureStatusLayerInfoCache = result;
  return result;
}

function getExistingMeasureStatusD4AFieldsFromInfo(layerInfo) {
  return layerInfo.fields
    .map(function(field) { return field.name; })
    .filter(function(fieldName) {
      // Accept both field-name formats:
      //   D4A_01  ... D4A_93   current ArcGIS field names
      //   D4A_001 ... D4A_093  internal measure IDs / fallback
      return /^D4A_\d{1,3}$/i.test(fieldName);
    });
}

async function queryMeasureStatusObjectIdsForReach(reachId) {
  var url = CONFIG.MEASURE_STATUS_LAYER_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_MEASURE_STATUS_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("returnIdsOnly", "true");

  if (CONFIG.MEASURE_STATUS_TOKEN) {
    formData.append("token", CONFIG.MEASURE_STATUS_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while querying measure-status layer: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from measure-status layer.");
  }

  return result.objectIds || [];
}



/* ------------------------------------------------------------------
   ASSIGNMENT SESSION TABLE
------------------------------------------------------------------ */

function getSessionId() {
  var params = new URLSearchParams(window.location.search);
  return cleanSessionValue(
    params.get("session_id") ||
    params.get("Session_ID") ||
    params.get("SESSION_ID") ||
    CONFIG.DEFAULT_SESSION_ID ||
    "default"
  );
}

function cleanSessionValue(value) {
  if (value === null || value === undefined) { return ""; }
  return String(value).replace(/\u00a0/g, " ").trim();
}

function isAssignmentSessionConfigured() {
  return isUrlConfigured(CONFIG.ASSIGNMENT_SESSION_TABLE_URL);
}

async function safeUpdateAssignmentSessionRefinement(reachId) {
  if (!reachId || !isAssignmentSessionConfigured()) { return null; }

  var attributes = buildBaseAssignmentSessionAttributes(reachId, "refinement");
  attributes[CONFIG.FIELD_SESSION_ACTIVE_ASSIGNMENT_GROUP] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_ASSIGNMENT_TARGET] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_GEOMETRY_TYPE] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_EDIT_TOOL] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_MEASURE_IDS] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_MEASURE_COUNT] = 0;

  return safeUpsertAssignmentSession(attributes);
}

async function safeUpdateAssignmentSessionForGroup(reachId, group, records) {
  if (!reachId || !group || !isAssignmentSessionConfigured()) { return null; }

  var pendingRecords = (records || []).filter(function(record) {
    return record.assignment_status === CONFIG.ASSIGNMENT_STATUS_PENDING ||
      record.assignment_status === CONFIG.ASSIGNMENT_STATUS_UNCLASSIFIED;
  });

  var sample = pendingRecords[0] || (records && records[0]) || null;
  var attributes = buildBaseAssignmentSessionAttributes(reachId, pendingRecords.length > 0 ? "editing" : "completed");

  attributes[CONFIG.FIELD_SESSION_ACTIVE_ASSIGNMENT_GROUP] = group;
  attributes[CONFIG.FIELD_SESSION_ACTIVE_ASSIGNMENT_TARGET] = sample && sample.assignment_target ? sample.assignment_target : "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_GEOMETRY_TYPE] = sample && sample.geometry_type ? sample.geometry_type : "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_EDIT_TOOL] = getEditToolLabelForAssignmentGroup(group, sample);
  attributes[CONFIG.FIELD_SESSION_ACTIVE_MEASURE_IDS] = pendingRecords.map(function(record) {
    return record.measure_id;
  }).join(",");
  attributes[CONFIG.FIELD_SESSION_ACTIVE_MEASURE_COUNT] = pendingRecords.length;

  return safeUpsertAssignmentSession(attributes);
}

async function safeUpdateAssignmentSessionCompleted(reachId) {
  if (!reachId || !isAssignmentSessionConfigured()) { return null; }

  var attributes = buildBaseAssignmentSessionAttributes(reachId, "completed");
  attributes[CONFIG.FIELD_SESSION_ACTIVE_ASSIGNMENT_GROUP] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_ASSIGNMENT_TARGET] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_GEOMETRY_TYPE] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_EDIT_TOOL] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_MEASURE_IDS] = "";
  attributes[CONFIG.FIELD_SESSION_ACTIVE_MEASURE_COUNT] = 0;

  return safeUpsertAssignmentSession(attributes);
}

function buildBaseAssignmentSessionAttributes(reachId, workflowStatus) {
  var attributes = {};
  attributes[CONFIG.FIELD_SESSION_ID] = getSessionId();
  attributes[CONFIG.FIELD_SESSION_ACTIVE_REACH_ID] = cleanSessionValue(reachId);
  attributes[CONFIG.FIELD_SESSION_WORKFLOW_STATUS] = workflowStatus;
  attributes[CONFIG.FIELD_SESSION_UPDATED_AT] = Date.now();
  return attributes;
}

async function safeUpsertAssignmentSession(attributes) {
  try {
    return await upsertAssignmentSession(attributes);
  } catch (error) {
    console.warn("Assignment session table could not be updated.", error);
    return null;
  }
}

async function upsertAssignmentSession(attributes) {
  var sessionId = attributes[CONFIG.FIELD_SESSION_ID] || getSessionId();
  var objectIds = await queryAssignmentSessionObjectIds(sessionId);

  if (objectIds.length > 0) {
    var info = await getAssignmentSessionTableInfo();
    var objectIdField = info.objectIdField || "OBJECTID";
    attributes[objectIdField] = objectIds[0];
    return updateAssignmentSessionRow(attributes);
  }

  return addAssignmentSessionRow(attributes);
}

async function queryAssignmentSessionObjectIds(sessionId) {
  var url = CONFIG.ASSIGNMENT_SESSION_TABLE_URL.replace(/\/$/, "") + "/query";
  var where = CONFIG.FIELD_SESSION_ID + " = '" + escapeSqlLiteral(sessionId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("returnIdsOnly", "true");

  if (CONFIG.ASSIGNMENT_SESSION_TOKEN) {
    formData.append("token", CONFIG.ASSIGNMENT_SESSION_TOKEN);
  }

  var response = await fetch(url, { method: "POST", body: formData });

  if (!response.ok) {
    throw new Error("HTTP error while querying assignment session table: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from assignment session table.");
  }

  return result.objectIds || [];
}

async function getAssignmentSessionTableInfo() {
  if (assignmentSessionTableInfoCache) {
    return assignmentSessionTableInfoCache;
  }

  var url = CONFIG.ASSIGNMENT_SESSION_TABLE_URL.replace(/\/$/, "");
  var formData = new FormData();
  formData.append("f", "json");

  if (CONFIG.ASSIGNMENT_SESSION_TOKEN) {
    formData.append("token", CONFIG.ASSIGNMENT_SESSION_TOKEN);
  }

  var response = await fetch(url, { method: "POST", body: formData });

  if (!response.ok) {
    throw new Error("HTTP error while reading assignment session table metadata: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS metadata error from assignment session table.");
  }

  assignmentSessionTableInfoCache = result;
  return result;
}

async function addAssignmentSessionRow(attributes) {
  var url = CONFIG.ASSIGNMENT_SESSION_TABLE_URL.replace(/\/$/, "") + "/addFeatures";
  var formData = new FormData();
  formData.append("f", "json");
  formData.append("features", JSON.stringify([{ attributes: attributes }]));

  if (CONFIG.ASSIGNMENT_SESSION_TOKEN) {
    formData.append("token", CONFIG.ASSIGNMENT_SESSION_TOKEN);
  }

  var response = await fetch(url, { method: "POST", body: formData });

  if (!response.ok) {
    throw new Error("HTTP error while adding assignment session row: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS addFeatures error from assignment session table.");
  }

  if (!allAddsSuccessful(result)) {
    throw new Error(buildAddFeaturesErrorMessage(result, "assignment session table"));
  }

  return result;
}

async function updateAssignmentSessionRow(attributes) {
  var url = CONFIG.ASSIGNMENT_SESSION_TABLE_URL.replace(/\/$/, "") + "/updateFeatures";
  var formData = new FormData();
  formData.append("f", "json");
  formData.append("features", JSON.stringify([{ attributes: attributes }]));

  if (CONFIG.ASSIGNMENT_SESSION_TOKEN) {
    formData.append("token", CONFIG.ASSIGNMENT_SESSION_TOKEN);
  }

  var response = await fetch(url, { method: "POST", body: formData });

  if (!response.ok) {
    throw new Error("HTTP error while updating assignment session row: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS updateFeatures error from assignment session table.");
  }

  if (!allUpdatesSuccessful(result)) {
    throw new Error(buildUpdateFeaturesErrorMessageForResult(result, "assignment session table"));
  }

  return result;
}

function buildAddFeaturesErrorMessage(result, label) {
  label = label || "table";

  if (!result || !result.addResults || result.addResults.length === 0) {
    return "ArcGIS addFeatures returned no addResults for the " + label + ".";
  }

  var errors = result.addResults
    .filter(function(r) { return r.success !== true; })
    .map(function(r, index) {
      if (!r.error) {
        return "Row " + (index + 1) + ": unsuccessful add with no ArcGIS error details.";
      }

      var parts = ["Row " + (index + 1)];
      if (r.error.code !== undefined) { parts.push("code " + r.error.code); }
      if (r.error.message) { parts.push(r.error.message); }
      if (r.error.description) { parts.push(r.error.description); }
      return parts.join(": ");
    });

  return "ArcGIS addFeatures failed for the " + label + ": " + errors.join(" | ");
}

function buildUpdateFeaturesErrorMessageForResult(result, label) {
  label = label || "layer/table";

  if (!result || !result.updateResults || result.updateResults.length === 0) {
    return "ArcGIS updateFeatures returned no updateResults for the " + label + ".";
  }

  var errors = result.updateResults
    .filter(function(r) { return r.success !== true; })
    .map(function(r) {
      if (!r.error) {
        return "Unsuccessful update with no ArcGIS error details.";
      }

      var parts = [];
      if (r.error.code !== undefined) { parts.push("code " + r.error.code); }
      if (r.error.message) { parts.push(r.error.message); }
      if (r.error.description) { parts.push(r.error.description); }
      return parts.join(": ");
    });

  return "ArcGIS updateFeatures failed for the " + label + ": " + errors.join(" | ");
}

/* ------------------------------------------------------------------
   CONTEXT FILTERS AND ASSIGNMENT DASHBOARD
------------------------------------------------------------------ */

function filterMeasureIdsByContext(measureIds, isImpounded, hasBarrier) {
  return measureIds.filter(function(id) {
    var rule = getAssignmentRuleForMeasure(id);

    if (!rule) { return true; }

    if (isImpoundmentOnlyRule(rule) && isImpounded === false) {
      return false;
    }

    if (isBarrierOnlyRule(rule) && hasBarrier === false) {
      return false;
    }

    return true;
  });
}

function isBarrierOnlyRule(rule) {
  if (!rule) { return false; }

  var group = cleanRuleValue(rule.assignment_group).toLowerCase();
  var target = cleanRuleValue(rule.assignment_target).toLowerCase();

  if (target.indexOf("dam") !== -1 || target.indexOf("barrier") !== -1) { return true; }
  if (group.indexOf("dam") !== -1) { return true; }
  if (group.indexOf("hydropeaking") !== -1) { return true; }

  return false;
}

function getReachBarrierContextStatus(attributes) {
  // Priority:
  // 1. URL parameter override, e.g. ?has_barrier=yes
  // 2. Saved answer in the reach/problem layer field filter_barrier_answer
  // 3. Unknown/null, so the user has to answer the question
  var fromUrl = getBarrierContextFromUrl();
  if (fromUrl !== null) { return fromUrl; }

  if (attributes && CONFIG.FIELD_FILTER_BARRIER_ANSWER) {
    var savedValue = getAttributeCaseInsensitive(attributes, CONFIG.FIELD_FILTER_BARRIER_ANSWER);
    var parsedSavedValue = parseYesNoContextValue(savedValue);
    if (parsedSavedValue !== null) { return parsedSavedValue; }
  }

  return null;
}

function getBarrierContextFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var value =
    params.get("has_barrier") ||
    params.get("barrier") ||
    params.get("Barrier") ||
    params.get("HAS_BARRIER");

  return parseYesNoContextValue(value);
}

function parseYesNoContextValue(value) {
  if (value === null || value === undefined || value === "") { return null; }

  var text = String(value).replace(/\u00a0/g, " ").trim().toLowerCase();

  if (["1", "yes", "y", "true", "barrier", "impounded"].indexOf(text) !== -1) { return true; }
  if (["0", "no", "n", "false", "none", "no_barrier", "not_impounded", "not impounded", "free_flowing", "free-flowing"].indexOf(text) !== -1) { return false; }

  return null;
}

function goBackToRefinement() {
  var hasConfirmedAssignments = assignmentRecords.some(function(record) {
    return record.assignment_status === CONFIG.ASSIGNMENT_STATUS_ASSIGNED &&
      record.assigned_layer !== CONFIG.ASSIGNED_LAYER_REACH;
  });

  var dashboard = document.getElementById("assignment-dashboard");
  var contextPanel = document.getElementById("context-panel");
  var refinementLayout = document.getElementById("refinement-layout");

  if (!dashboard || !contextPanel || !refinementLayout) {
    console.error("Back button failed: one or more layout elements were not found.", {
      dashboard: dashboard,
      contextPanel: contextPanel,
      refinementLayout: refinementLayout
    });
    return;
  }

  dashboard.classList.add("hidden");
  contextPanel.classList.remove("hidden");
  refinementLayout.classList.remove("hidden");

  activeAssignmentGroup = null;
  safeUpdateAssignmentSessionRefinement(getReachIdFromUrl());
  refreshCheckedStates();
  updateSelectedList();

  if (hasConfirmedAssignments) {
    setStatus(
      "Returned to selected measures. Warning: one or more assignment groups have already been confirmed. If you change the selected measures and confirm again, the selected-measures rows for this reach will be recreated and assignment progress may be reset.",
      "error"
    );
  } else {
    setStatus("You can now change the selected measures. Click Confirm selection again to save the revised list.", "");
  }
}

function showAssignmentDashboard() {
  document.getElementById("context-panel").classList.add("hidden");
  document.getElementById("refinement-layout").classList.add("hidden");
  document.getElementById("assignment-dashboard").classList.remove("hidden");

  activeAssignmentGroup = findNextPendingAssignmentGroup() || findFirstAssignmentGroup();
  renderAssignmentDashboard();
}

function renderAssignmentDashboard() {
  renderAssignmentTabs();
  openAssignmentGroup(activeAssignmentGroup);
}

function renderAssignmentTabs() {
  var container = document.getElementById("assignment-tabs");
  container.innerHTML = "";

  var groups = getAssignmentGroupsInOrder();

  groups.forEach(function(group) {
    var summary = getAssignmentGroupSummary(group);
    var button = document.createElement("button");
    button.className = "assignment-tab " + getAssignmentGroupButtonClass(group, summary);
    button.textContent = group + " (" + summary.assigned + "/" + summary.total + ")";
    button.addEventListener("click", function() {
      activeAssignmentGroup = group;
      renderAssignmentDashboard();
    });
    container.appendChild(button);
  });
}

function getAssignmentGroupsInOrder() {
  var groupMap = {};
  assignmentRecords.forEach(function(record) {
    groupMap[record.assignment_group || "unclassified"] = true;
  });

  return Object.keys(groupMap).sort(function(a, b) {
    return getAssignmentGroupOrder(a) - getAssignmentGroupOrder(b) || a.localeCompare(b);
  });
}

function getAssignmentGroupButtonClass(group, summary) {
  if (group === activeAssignmentGroup) { return "active"; }
  if (summary.total === 0) { return "has-none"; }
  if (summary.pending > 0 || summary.unclassified > 0) { return "pending"; }
  return "assigned";
}

function getAssignmentGroupSummary(group) {
  var records = assignmentRecords.filter(function(record) { return record.assignment_group === group; });
  var summary = { total: records.length, assigned: 0, pending: 0, unclassified: 0 };

  records.forEach(function(record) {
    if (record.assignment_status === CONFIG.ASSIGNMENT_STATUS_ASSIGNED) { summary.assigned++; }
    else if (record.assignment_status === CONFIG.ASSIGNMENT_STATUS_PENDING) { summary.pending++; }
    else { summary.unclassified++; }
  });

  return summary;
}

function openAssignmentGroup(group) {
  if (!group) { return; }

  var records = assignmentRecords
    .filter(function(record) { return record.assignment_group === group; })
    .sort(function(a, b) { return getMeasureNumber(a.measure_id) - getMeasureNumber(b.measure_id); });

  var summary = getAssignmentGroupSummary(group);
  var listPanel = document.getElementById("assignment-list-panel");
  var toolPanel = document.getElementById("assignment-tool-panel");

  listPanel.innerHTML =
    '<div class="assignment-title">' + escapeHtml(group) + '</div>' +
    '<div class="assignment-summary">' + summary.total + ' selected measure(s), ' + summary.assigned + ' assigned, ' + summary.pending + ' pending.</div>';

  if (records.length === 0) {
    listPanel.innerHTML += '<div class="empty-state">No selected measures in this group.</div>';
  } else {
    records.forEach(function(record) {
      var item = document.createElement("div");
      item.className = "assignment-measure " + escapeHtml(record.assignment_status);
      item.innerHTML =
        '<div class="assignment-measure-head">' +
          '<span class="measure-id">' + escapeHtml(record.measure_id) + '</span>' +
          '<span class="measure-name">' + escapeHtml(record.measure_name) + '</span>' +
          '<span class="assignment-status-badge ' + escapeHtml(record.assignment_status) + '">' + escapeHtml(record.assignment_status) + '</span>' +
        '</div>' +
        '';
      listPanel.appendChild(item);
    });
  }

  renderAssignmentToolPanel(group, records, summary, toolPanel);
  safeUpdateAssignmentSessionForGroup(getReachIdFromUrl(), group, records);
}

function getEditToolLabelForAssignmentGroup(group, sample) {
  if (CONFIG.ASSIGNMENT_EDIT_TOOL_LABELS && CONFIG.ASSIGNMENT_EDIT_TOOL_LABELS[group]) {
    return CONFIG.ASSIGNMENT_EDIT_TOOL_LABELS[group];
  }

  if (sample && sample.assignment_target) {
    return sample.assignment_target + " edit tool";
  }

  return group + " edit tool";
}

function getAssignmentInstructionText(group, sample) {
  var toolLabel = getEditToolLabelForAssignmentGroup(group, sample);
  return "Please use the " + toolLabel + " to assign the measures on the map and then click the button below to confirm.";
}

function renderAssignmentToolPanel(group, records, summary, panel) {
  var pendingRecords = records.filter(function(record) {
    return record.assignment_status === CONFIG.ASSIGNMENT_STATUS_PENDING || record.assignment_status === CONFIG.ASSIGNMENT_STATUS_UNCLASSIFIED;
  });

  if (pendingRecords.length === 0) {
    panel.innerHTML =
      '<div class="tool-card">' +
        '<div class="assignment-title">Group complete</div>' +
        '<div class="tool-hint">All selected measures in this group are already assigned. The workflow has moved to the next pending group where available.</div>' +
      '</div>';
    return;
  }

  var sample = pendingRecords[0];
  var nextGroup = findNextPendingAssignmentGroupAfter(group);

  panel.innerHTML =
    '<div class="tool-card">' +
      '<div class="assignment-title">Assign pending ' + escapeHtml(group) + '</div>' +
      '<div class="tool-hint"><strong>' + escapeHtml(getAssignmentInstructionText(group, sample)) + '</strong></div>' +
      '<div class="context-actions">' +
        '<button class="confirm-button" onclick="confirmActiveGroupAssignment()">Confirm this group assignment</button>' +
      '</div>' +
      '<div class="tool-hint">After confirming, this tool will automatically open the next pending assignment group: ' + escapeHtml(nextGroup || "none") + '.</div>' +
    '</div>';
}

async function confirmActiveGroupAssignment() {
  var group = activeAssignmentGroup;
  if (!group) { return; }

  var recordsToUpdate = assignmentRecords.filter(function(record) {
    return record.assignment_group === group && record.assignment_status !== CONFIG.ASSIGNMENT_STATUS_ASSIGNED;
  });

  var sample = recordsToUpdate.length > 0 ? recordsToUpdate[0] : null;
  var targetFeatureId = "";
  var assignedLayer = sample && sample.assignment_target ? sample.assignment_target : group;

  if (recordsToUpdate.length === 0) {
    setStatus("There are no pending measures in " + group + ".", "");
    return;
  }

  try {
    await updateSelectedMeasureAssignmentRows(recordsToUpdate, targetFeatureId, assignedLayer);
    await updateReachAssessmentStatusForCurrentState(getReachIdFromUrl(), group);
    setStatus("Assigned " + recordsToUpdate.length + " measure(s) in " + group + ". Reach assessment progress was updated.", "success");

    var nextPendingGroup = findNextPendingAssignmentGroup();
    if (nextPendingGroup) {
      activeAssignmentGroup = nextPendingGroup;
      renderAssignmentDashboard();
    } else {
      activeAssignmentGroup = group;
      await safeUpdateAssignmentSessionCompleted(getReachIdFromUrl());
      renderAssignmentDashboard();
    }

  } catch (error) {
    console.error(error);
    setStatus("Could not confirm assignment group: " + error.message, "error");
  }
}

function findNextPendingAssignmentGroup() {
  var groups = getAssignmentGroupsInOrder();
  for (var i = 0; i < groups.length; i++) {
    var summary = getAssignmentGroupSummary(groups[i]);
    if (summary.pending > 0 || summary.unclassified > 0) { return groups[i]; }
  }
  return null;
}

function findNextPendingAssignmentGroupAfter(group) {
  var groups = getAssignmentGroupsInOrder();
  var startIndex = groups.indexOf(group);
  if (startIndex === -1) { return findNextPendingAssignmentGroup(); }

  for (var offset = 1; offset <= groups.length; offset++) {
    var next = groups[(startIndex + offset) % groups.length];
    var summary = getAssignmentGroupSummary(next);
    if (summary.pending > 0 || summary.unclassified > 0) { return next; }
  }
  return null;
}

function findFirstAssignmentGroup() {
  var groups = getAssignmentGroupsInOrder();
  return groups.length > 0 ? groups[0] : null;
}

function getAssignmentGroupOrder(group) {
  var order = [
    "Reach Measures",
    "Reach Impoundment Measures",
    "Dam Measures",
    "Fish Dam Measures",
    "Flow Dam Measures",
    "Hydropeaking Measures",
    "Dike Measures",
    "Sidearm Measures",
    "Groyne Measures",
    "Gravel Bars",
    "Sediment Feeding/Dredging",
    "Riverbank Restoration",
    "Sediment Contamination Measures",
    "Ecological Restoration in the Reservior",
    "Measures at the Delta",
    "unclassified"
  ];

  var index = order.indexOf(group);
  return index === -1 ? 999 : index + 1;
}

/* ------------------------------------------------------------------
   HELPERS
------------------------------------------------------------------ */

function getMeasureById(id) {
  return MEASURES.find(function(m) {
    return m.id === id;
  });
}

function getMeasureNumber(id) {
  var m = getMeasureById(id);
  return m && m.measure_no ? m.measure_no : 999999;
}

function normaliseProblemId(value) {
  return String(value).trim().toLowerCase();
}

function getAttributeCaseInsensitive(attributes, fieldName) {
  var target = normaliseProblemId(fieldName);
  var keys = Object.keys(attributes);

  for (var i = 0; i < keys.length; i++) {
    if (normaliseProblemId(keys[i]) === target) {
      return attributes[keys[i]];
    }
  }

  return undefined;
}

function isUrlConfigured(url) {
  return (
    url &&
    url.indexOf("PASTE_") === -1 &&
    url.indexOf("YOUR_") === -1
  );
}

function allAddsSuccessful(result) {
  if (!result || !result.addResults) { return false; }

  return result.addResults.every(function(r) {
    return r.success === true;
  });
}

function allUpdatesSuccessful(result) {
  if (!result || !result.updateResults) { return false; }

  return result.updateResults.every(function(r) {
    return r.success === true;
  });
}

function buildUpdateFeaturesErrorMessage(result) {
  if (!result || !result.updateResults || result.updateResults.length === 0) {
    return "ArcGIS updateFeatures returned no updateResults for the measure-status layer.";
  }

  var errors = result.updateResults
    .filter(function(r) { return r.success !== true; })
    .map(function(r) {
      if (!r.error) {
        return "Unsuccessful update with no ArcGIS error details.";
      }

      var parts = [];
      if (r.error.code !== undefined) { parts.push("code " + r.error.code); }
      if (r.error.message) { parts.push(r.error.message); }
      if (r.error.description) { parts.push(r.error.description); }

      return parts.join(": ");
    });

  if (errors.length === 0) {
    return "ArcGIS updateFeatures returned an unsuccessful update result for the measure-status layer, but no detailed error was provided.";
  }

  return "Measure-status update failed: " + errors.join(" | ");
}

function getAssignmentRuleForMeasure(measureId) {
  var normalizedId = normalizeMeasureId(measureId);
  return MEASURE_ASSIGNMENT_RULES[normalizedId] || null;
}

function getInitialAssignmentInfoForMeasure(measureId, rule, reachId, now) {
  var normalizedId = normalizeMeasureId(measureId);

  if (!rule) {
    return {
      assignment_group: "unclassified",
      assignment_target: "unclassified",
      geometry_type: "",
      assignment_mode: "manual_review",
      assignment_status: CONFIG.ASSIGNMENT_STATUS_UNCLASSIFIED,
      assigned_feature_id: null,
      assigned_layer: null,
      assigned_at: null
    };
  }

  var assignmentGroup = cleanRuleValue(rule.assignment_group) || "unclassified";
  var assignmentTarget = cleanRuleValue(rule.assignment_target) || "unclassified";
  var geometryType = cleanRuleValue(rule.geometry_type) || inferGeometryTypeFromRule(rule);
  var assignmentMode = cleanRuleValue(rule.assignment_mode).toLowerCase() || "manual_review";
  var autoAssign = isAutoAssignRule(rule);

  if (autoAssign) {
    return {
      assignment_group: assignmentGroup,
      assignment_target: assignmentTarget,
      geometry_type: geometryType,
      assignment_mode: assignmentMode,
      assignment_status: CONFIG.ASSIGNMENT_STATUS_ASSIGNED,
      assigned_feature_id: reachId,
      assigned_layer: CONFIG.ASSIGNED_LAYER_REACH,
      assigned_at: now
    };
  }

  return {
    assignment_group: assignmentGroup,
    assignment_target: assignmentTarget,
    geometry_type: geometryType,
    assignment_mode: assignmentMode,
    assignment_status: CONFIG.ASSIGNMENT_STATUS_PENDING,
    assigned_feature_id: null,
    assigned_layer: null,
    assigned_at: null
  };
}

function shouldUpdateReachStatusForMeasure(measureId) {
  var rule = getAssignmentRuleForMeasure(measureId);

  if (!rule) { return false; }
  if (!isAutoAssignRule(rule)) { return false; }

  return cleanRuleValue(rule.assignment_target).toLowerCase() === "reach";
}

function isAutoAssignRule(rule) {
  if (!rule) { return false; }

  var autoValue = rule.auto_assign_if_selected;
  var mode = cleanRuleValue(rule.assignment_mode).toLowerCase();

  return autoValue === 1 || autoValue === "1" || autoValue === true || mode === "automatic";
}

function filterMeasureIdsByImpoundmentRule(measureIds, isImpounded) {
  if (!CONFIG.USE_IMPOUNDMENT_FILTER) { return measureIds; }

  // If impoundment status is unknown, keep all measures rather than hiding possibly relevant options.
  if (isImpounded === null || isImpounded === undefined) { return measureIds; }

  return measureIds.filter(function(id) {
    var rule = getAssignmentRuleForMeasure(id);

    if (!rule) { return true; }

    if (isImpoundmentOnlyRule(rule) && isImpounded === false) {
      return false;
    }

    return true;
  });
}

function isImpoundmentOnlyRule(rule) {
  return cleanRuleValue(rule.impoundment).toLowerCase() === "yes";
}

function getReachImpoundmentStatus(attributes) {
  // Priority:
  // 1. URL parameter override, e.g. ?is_impounded=yes
  // 2. Saved answer in the reach/problem layer field filter_impounded_answer
  // 3. Optional reach attribute is_impounded
  // 4. Unknown/null, so the user has to answer the question
  var fromUrl = getImpoundmentStatusFromUrl();

  if (fromUrl !== null) { return fromUrl; }

  if (attributes && CONFIG.FIELD_FILTER_IMPOUNDED_ANSWER) {
    var savedValue = getAttributeCaseInsensitive(attributes, CONFIG.FIELD_FILTER_IMPOUNDED_ANSWER);
    var parsedSavedValue = parseImpoundmentValue(savedValue);
    if (parsedSavedValue !== null) { return parsedSavedValue; }
  }

  if (!attributes || !CONFIG.FIELD_REACH_IS_IMPOUNDED) { return null; }

  var impoundedAttributeValue = getAttributeCaseInsensitive(attributes, CONFIG.FIELD_REACH_IS_IMPOUNDED);

  if (impoundedAttributeValue === undefined) {
    return null;
  }

  return parseImpoundmentValue(impoundedAttributeValue);
}

function getImpoundmentStatusFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var value =
    params.get("is_impounded") ||
    params.get("impounded") ||
    params.get("Impounded") ||
    params.get("IMPOUNDED");

  if (value === null || value === undefined || value === "") { return null; }

  return parseImpoundmentValue(value);
}

function parseImpoundmentValue(value) {
  if (value === null || value === undefined) { return null; }

  var text = String(value).trim().toLowerCase();

  if (["1", "yes", "y", "true", "impounded"].indexOf(text) !== -1) {
    return true;
  }

  if (["0", "no", "n", "false", "not_impounded", "not impounded", "free_flowing", "free-flowing"].indexOf(text) !== -1) {
    return false;
  }

  return null;
}

function getBarrierDisplayText() {
  if (currentReachHasBarrierContext === true) {
    return " | Barrier context: yes";
  }

  if (currentReachHasBarrierContext === false) {
    return " | No barrier context: barrier-only measures hidden";
  }

  return " | Barrier context not answered";
}

function getImpoundmentDisplayText() {
  if (currentReachIsImpounded === true) {
    return " | Impounded reach";
  }

  if (currentReachIsImpounded === false) {
    return " | Not impounded: impoundment-only measures hidden";
  }

  return " | Impoundment status unknown";
}

function getImpoundmentStatusTextForStatus() {
  if (currentReachIsImpounded === true) {
    return " for an impounded reach";
  }

  if (currentReachIsImpounded === false) {
    return "; impoundment-only measures were hidden";
  }

  return "; impoundment status was not available";
}

function getPendingAssignmentSummaryTextFromRecords(records) {
  var counts = {};

  records.forEach(function(record) {
    if (record.assignment_status === CONFIG.ASSIGNMENT_STATUS_ASSIGNED) { return; }

    var group = record.assignment_group || "unclassified";
    counts[group] = (counts[group] || 0) + 1;
  });

  var groups = Object.keys(counts).sort();

  if (groups.length === 0) {
    return "";
  }

  var parts = groups.map(function(group) {
    return counts[group] + " " + group;
  });

  return " Pending assignment: " + parts.join(", ") + ".";
}

function getPendingAssignmentSummaryText(measureIds) {
  var counts = {};

  measureIds.forEach(function(id) {
    var rule = getAssignmentRuleForMeasure(id);

    if (!rule || isAutoAssignRule(rule)) { return; }

    var group = cleanRuleValue(rule.assignment_group) || "unclassified";
    counts[group] = (counts[group] || 0) + 1;
  });

  var groups = Object.keys(counts).sort();

  if (groups.length === 0) {
    return "";
  }

  var parts = groups.map(function(group) {
    return counts[group] + " " + group;
  });

  return " Pending assignment: " + parts.join(", ") + ".";
}

function cleanRuleValue(value) {
  if (value === null || value === undefined) { return ""; }
  return String(value).replace(/\u00a0/g, " ").trim();
}

function inferGeometryTypeFromRule(rule) {
  var target = cleanRuleValue(rule.assignment_target).toLowerCase();
  var group = cleanRuleValue(rule.assignment_group).toLowerCase();

  if (target === "reach") { return "line"; }
  if (target.indexOf("dam") !== -1 || target.indexOf("barrier") !== -1) { return "point"; }
  if (target.indexOf("location") !== -1) { return "point"; }
  if (target.indexOf("dike") !== -1 || target.indexOf("groyne") !== -1 || target.indexOf("side") !== -1 || target.indexOf("riverbank") !== -1) { return "line"; }
  if (group.indexOf("dam") !== -1 || group.indexOf("gravel") !== -1 || group.indexOf("feeding") !== -1 || group.indexOf("dredging") !== -1) { return "point"; }

  return "";
}

function setStatus(message, type) {
  var el = document.getElementById("status-message");

  el.textContent = message;
  el.className = "status-message";

  if (type) {
    el.classList.add(type);
  }
}

function clearStatus() {
  setStatus("", "");
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeMeasureId(value) {
  // Normalises both internal measure IDs and ArcGIS field names to the same key.
  // Examples:
  //   D4A_001 -> D4A_001
  //   D4A_01  -> D4A_001
  //   D4A_1   -> D4A_001
  var raw = String(value).trim().toUpperCase();
  var match = raw.match(/^D4A_(\d{1,3})$/);

  if (!match) {
    return raw;
  }

  var numberPart = parseInt(match[1], 10);

  if (isNaN(numberPart)) {
    return raw;
  }

  return "D4A_" + String(numberPart).padStart(3, "0");
}

function escapeSqlLiteral(value) {
  return String(value).replaceAll("'", "''");
}
</script>
