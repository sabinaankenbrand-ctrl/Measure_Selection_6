------------------------------------------------------------------ */

function filterMeasureIdsByContext(measureIds, isImpounded, hasBarrier) {
  return measureIds.filter(function(id) {
    var rule = getAssignmentRuleForMeasure(id);

    if (!rule) { return true; }

    if (isImpoundmentOnlyRule(rule) && isImpounded === false) {
      return false;
    }

    if (isBarrierOnlyRule(rule) && hasBarrier === false) {
      return false;
    }

    return true;
  });
}

function isBarrierOnlyRule(rule) {
  if (!rule) { return false; }

  var group = cleanRuleValue(rule.assignment_group).toLowerCase();
  var target = cleanRuleValue(rule.assignment_target).toLowerCase();

  if (target.indexOf("dam") !== -1 || target.indexOf("barrier") !== -1) { return true; }
  if (group.indexOf("dam") !== -1) { return true; }
  if (group.indexOf("hydropeaking") !== -1) { return true; }

  return false;
}

/* ------------------------------------------------------------------
   CONTEXT FILTER ANSWERS (impounded / barrier)

   Both questions use the same yes/no logic and the same priority
   order for where the answer comes from:
     1. URL parameter override (e.g. ?is_impounded=yes)
     2. Previously saved answer on the reach layer
     3. null = unanswered, user must click Yes/No

   The "impounded" question intentionally has no extra fallback field
   (e.g. from a problem-matrix column) - if a reach has never been
   answered, the user simply answers it once. This keeps the reach
   layer schema minimal: only filter_impounded_answer and
   filter_barrier_answer are required per country.
------------------------------------------------------------------ */

var CONTEXT_QUESTIONS = {
  impounded: {
    urlParams: ["is_impounded", "impounded", "Impounded", "IMPOUNDED"],
    savedField: CONFIG.FIELD_FILTER_IMPOUNDED_ANSWER
  },
  barrier: {
    urlParams: ["has_barrier", "barrier", "Barrier", "HAS_BARRIER"],
    savedField: CONFIG.FIELD_FILTER_BARRIER_ANSWER
  }
};

function parseYesNoValue(value) {
  if (value === null || value === undefined || value === "") { return null; }

  var text = String(value).replace(/\u00a0/g, " ").trim().toLowerCase();

  if (["1", "yes", "y", "true", "barrier", "impounded"].indexOf(text) !== -1) { return true; }
  if (["0", "no", "n", "false", "none", "no_barrier", "not_impounded", "not impounded", "free_flowing", "free-flowing"].indexOf(text) !== -1) { return false; }

  return null;
}

function getYesNoFromUrl(paramNames) {
  var params = new URLSearchParams(window.location.search);

  for (var i = 0; i < paramNames.length; i++) {
    var value = params.get(paramNames[i]);
    if (value !== null && value !== "") { return parseYesNoValue(value); }
  }

  return null;
}

// questionKey is "impounded" or "barrier".
function getContextAnswer(questionKey, attributes) {
  var question = CONTEXT_QUESTIONS[questionKey];

  var fromUrl = getYesNoFromUrl(question.urlParams);
  if (fromUrl !== null) { return fromUrl; }

  if (attributes && question.savedField) {
    var saved = parseYesNoValue(getAttributeCaseInsensitive(attributes, question.savedField));
    if (saved !== null) { return saved; }
  }

  return null;
}

function goBackToRefinement() {
  var hasConfirmedAssignments = assignmentRecords.some(function(record) {
    return record.assignment_status === CONFIG.ASSIGNMENT_STATUS_ASSIGNED &&
      record.assigned_layer !== CONFIG.ASSIGNED_LAYER_REACH;
  });

  var dashboard = document.getElementById("assignment-dashboard");
  var contextPanel = document.getElementById("context-panel");
  var refinementLayout = document.getElementById("refinement-layout");

  if (!dashboard || !contextPanel || !refinementLayout) {
    console.error("Back button failed: one or more layout elements were not found.", {
      dashboard: dashboard,
      contextPanel: contextPanel,
      refinementLayout: refinementLayout
    });
    return;
  }

  dashboard.classList.add("hidden");
  contextPanel.classList.remove("hidden");
  refinementLayout.classList.remove("hidden");
  document.getElementById("edit-context-button").classList.add("hidden");

  activeAssignmentGroup = null;
  safeUpdateAssignmentSessionRefinement(getReachIdFromUrl());
  refreshCheckedStates();
  updateSelectedList();

  if (hasConfirmedAssignments) {
    setStatus(
      "Returned to selected measures. Warning: one or more assignment groups have already been confirmed. If you change the selected measures and confirm again, the selected-measures rows for this reach will be recreated and assignment progress may be reset.",
      "error"
    );
  } else {
    setStatus("You can now change the selected measures. Click Confirm selection again to save the revised list.", "");
  }
}

function showAssignmentDashboard() {
  document.getElementById("context-panel").classList.add("hidden");
  document.getElementById("refinement-layout").classList.add("hidden");
  document.getElementById("edit-context-button").classList.add("hidden");
  document.getElementById("assignment-dashboard").classList.remove("hidden");

  activeAssignmentGroup = findNextPendingAssignmentGroup() || findFirstAssignmentGroup();
  renderAssignmentDashboard();
}

function renderAssignmentDashboard() {
  renderAssignmentTabs();
  openAssignmentGroup(activeAssignmentGroup);
}

function renderAssignmentTabs() {
  var container = document.getElementById("assignment-tabs");
  container.innerHTML = "";

  var groups = getAssignmentGroupsInOrder();

  groups.forEach(function(group) {
    var summary = getAssignmentGroupSummary(group);
    var button = document.createElement("button");
    button.className = "assignment-tab " + getAssignmentGroupButtonClass(group, summary);
    button.textContent = group + " (" + summary.assigned + "/" + summary.total + ")";
    button.addEventListener("click", function() {
      activeAssignmentGroup = group;
      renderAssignmentDashboard();
    });
    container.appendChild(button);
  });
}

function getAssignmentGroupsInOrder() {
  var groupMap = {};
  assignmentRecords.forEach(function(record) {
    groupMap[record.assignment_group || "unclassified"] = true;
  });

  return Object.keys(groupMap).sort(function(a, b) {
    return getAssignmentGroupOrder(a) - getAssignmentGroupOrder(b) || a.localeCompare(b);
  });
}

function getAssignmentGroupButtonClass(group, summary) {
  if (group === activeAssignmentGroup) { return "active"; }
  if (summary.total === 0) { return "has-none"; }
  if (summary.pending > 0 || summary.unclassified > 0) { return "pending"; }
  return "assigned";
}

function getAssignmentGroupSummary(group) {
  var records = assignmentRecords.filter(function(record) { return record.assignment_group === group; });
  var summary = { total: records.length, assigned: 0, pending: 0, unclassified: 0 };

  records.forEach(function(record) {
    if (record.assignment_status === CONFIG.ASSIGNMENT_STATUS_ASSIGNED) { summary.assigned++; }
    else if (record.assignment_status === CONFIG.ASSIGNMENT_STATUS_PENDING) { summary.pending++; }
    else { summary.unclassified++; }
  });

  return summary;
}

function openAssignmentGroup(group) {
  if (!group) { return; }

  var records = assignmentRecords
    .filter(function(record) { return record.assignment_group === group; })
    .sort(function(a, b) { return getMeasureNumber(a.measure_id) - getMeasureNumber(b.measure_id); });

  var summary = getAssignmentGroupSummary(group);
  var listPanel = document.getElementById("assignment-list-panel");
  var toolPanel = document.getElementById("assignment-tool-panel");

  listPanel.innerHTML =
    '<div class="assignment-title">' + escapeHtml(group) + '</div>' +
    '<div class="assignment-summary">' + summary.total + ' selected measure(s), ' + summary.assigned + ' assigned, ' + summary.pending + ' pending.</div>';

  if (records.length === 0) {
    listPanel.innerHTML += '<div class="empty-state">No selected measures in this group.</div>';
  } else {
    records.forEach(function(record) {
      var item = document.createElement("div");
      item.className = "assignment-measure " + escapeHtml(record.assignment_status);
      if (record.keep === false) {
        item.classList.add("unkept");
      }

      var isPending = record.assignment_status === CONFIG.ASSIGNMENT_STATUS_PENDING || record.assignment_status === CONFIG.ASSIGNMENT_STATUS_UNCLASSIFIED;
      var instructionHtml = "";

      if (isPending && GROUPS_WITH_INLINE_EDIT_INSTRUCTION.indexOf(group) !== -1) {
        var toolLabel = getEditToolLabelForAssignmentGroup(group, record);
        instructionHtml = '<div class="assignment-measure-instruction">Please use the ' + escapeHtml(toolLabel) + ' to assign this measure on the map.</div>';
      }

      item.innerHTML =
        '<div class="assignment-measure-head">' +
          '<input type="checkbox" class="assignment-keep-checkbox"' + (record.keep !== false ? ' checked' : '') + '>' +
          '<span class="measure-id">' + escapeHtml(record.measure_id) + '</span>' +
          '<span class="measure-name">' + escapeHtml(record.measure_name) + '</span>' +
          '<span class="assignment-status-badge ' + escapeHtml(record.assignment_status) + '">' + escapeHtml(record.assignment_status) + '</span>' +
        '</div>' +
        instructionHtml;

      var checkbox = item.querySelector(".assignment-keep-checkbox");
      checkbox.addEventListener("click", function(event) {
        event.stopPropagation();
        record.keep = checkbox.checked;
        item.classList.toggle("unkept", !checkbox.checked);
      });

      listPanel.appendChild(item);
    });
  }

  renderAssignmentToolPanel(group, records, summary, toolPanel);
  safeUpdateAssignmentSessionForGroup(getReachIdFromUrl(), group, records);
}

function getEditToolLabelForAssignmentGroup(group, sample) {
  if (CONFIG.ASSIGNMENT_EDIT_TOOL_LABELS && CONFIG.ASSIGNMENT_EDIT_TOOL_LABELS[group]) {
    return CONFIG.ASSIGNMENT_EDIT_TOOL_LABELS[group];
  }

  if (sample && sample.assignment_target) {
    return sample.assignment_target + " edit tool";
  }

  return group + " edit tool";
}

function renderAssignmentToolPanel(group, records, summary, panel) {
  var pendingRecords = records.filter(function(record) {
    return record.assignment_status === CONFIG.ASSIGNMENT_STATUS_PENDING || record.assignment_status === CONFIG.ASSIGNMENT_STATUS_UNCLASSIFIED;
  });

  if (pendingRecords.length === 0) {
    var nextGroupForCompleted = findNextGroupInOrderAfter(group);
    var isEverythingComplete = !nextGroupForCompleted && allAssignmentGroupsComplete();

    var actionButtonHtml;
    if (nextGroupForCompleted) {
      actionButtonHtml = '<button class="confirm-button" onclick="goToGroup(\'' + escapeHtml(nextGroupForCompleted) + '\')">Next measure group</button>';
    } else if (isEverythingComplete) {
      actionButtonHtml = '<button class="confirm-button" onclick="showSummaryPanel()">View Summary</button>';
    } else {
      actionButtonHtml = '<button class="confirm-button" disabled>No more groups</button>';
    }

    panel.innerHTML =
      '<div class="tool-card">' +
        '<div class="assignment-title">Group complete</div>' +
        '<div class="tool-hint">All selected measures in this group are already assigned.</div>' +
        '<div class="context-actions">' +
          actionButtonHtml +
        '</div>' +
      '</div>';
    return;
  }

  var nextGroup = findNextPendingAssignmentGroupAfter(group);

  panel.innerHTML =
    '<div class="tool-card">' +
      '<div class="assignment-title">' + escapeHtml(group) + '</div>' +
      '<div class="tool-hint">Once all measures above have been assigned on the map, confirm below.</div>' +
      '<div class="context-actions">' +
        '<button class="confirm-button" onclick="confirmActiveGroupAssignment()">Confirm this group assignment</button>' +
      '</div>' +
      '<div class="tool-hint">After confirming, this tool will automatically open the next pending assignment group: ' + escapeHtml(nextGroup || "none") + '.</div>' +
    '</div>';
}

function goToGroup(group) {
  if (!group) { return; }
  activeAssignmentGroup = group;
  renderAssignmentDashboard();
}

function findNextGroupInOrderAfter(group) {
  var groups = getAssignmentGroupsInOrder();
  var startIndex = groups.indexOf(group);
  if (startIndex === -1 || groups.length <= 1) { return null; }

  var nextIndex = startIndex + 1;
  return nextIndex < groups.length ? groups[nextIndex] : null;
}

async function confirmActiveGroupAssignment() {
  var group = activeAssignmentGroup;
  if (!group) { return; }

  var groupRecords = assignmentRecords.filter(function(record) {
    return record.assignment_group === group;
  });

  var recordsToRemove = groupRecords.filter(function(record) {
    return record.keep === false;
  });

  var recordsToUpdate = groupRecords.filter(function(record) {
    return record.keep !== false && record.assignment_status !== CONFIG.ASSIGNMENT_STATUS_ASSIGNED;
  });

  var sample = recordsToUpdate.length > 0 ? recordsToUpdate[0] : (groupRecords[0] || null);
  var targetFeatureId = "";
  var assignedLayer = sample && sample.assignment_target ? sample.assignment_target : group;

  if (recordsToUpdate.length === 0 && recordsToRemove.length === 0) {
    setStatus("There are no pending measures in " + group + ".", "");
    return;
  }

  try {
    if (recordsToRemove.length > 0) {
      await deleteSelectedMeasureRows(recordsToRemove);

      recordsToRemove.forEach(function(record) {
        var index = assignmentRecords.indexOf(record);
        if (index !== -1) { assignmentRecords.splice(index, 1); }
      });
    }

    if (recordsToUpdate.length > 0) {
      await updateSelectedMeasureAssignmentRows(recordsToUpdate, targetFeatureId, assignedLayer);
    }

    await updateReachAssessmentStatusForCurrentState(getReachIdFromUrl(), group);

    var statusMessage = "";
    if (recordsToUpdate.length > 0) {
      statusMessage += "Assigned " + recordsToUpdate.length + " measure(s) in " + group + ". ";
    }
    if (recordsToRemove.length > 0) {
      statusMessage += "Removed " + recordsToRemove.length + " unticked measure(s) from " + group + ". ";
    }
    statusMessage += "Reach assessment progress was updated.";
    setStatus(statusMessage, "success");

    goToNextGroupAfterConfirm(group);

  } catch (error) {
    console.error(error);
    setStatus("Could not confirm assignment group: " + error.message, "error");
  }
}

function goToNextGroupAfterConfirm(group) {
  var nextPendingGroup = findNextPendingAssignmentGroup();
  if (nextPendingGroup) {
    activeAssignmentGroup = nextPendingGroup;
    renderAssignmentDashboard();
  } else {
    activeAssignmentGroup = group;
    safeUpdateAssignmentSessionCompleted(getReachIdFromUrl());
    renderAssignmentDashboard();
  }
}

async function deleteSelectedMeasureRows(records) {
  var objectIds = records
    .map(function(record) { return record.objectId; })
    .filter(function(objectId) { return objectId !== null && objectId !== undefined; });

  if (objectIds.length === 0) { return null; }

  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/deleteFeatures";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("objectIds", objectIds.join(","));

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while removing unticked measures: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS deleteFeatures error while removing unticked measures.");
  }

  return result;
}

function findNextPendingAssignmentGroup() {
  var groups = getAssignmentGroupsInOrder();
  for (var i = 0; i < groups.length; i++) {
    var summary = getAssignmentGroupSummary(groups[i]);
    if (summary.pending > 0 || summary.unclassified > 0) { return groups[i]; }
  }
  return null;
}

function findNextPendingAssignmentGroupAfter(group) {
  var groups = getAssignmentGroupsInOrder();
  var startIndex = groups.indexOf(group);
  if (startIndex === -1) { return findNextPendingAssignmentGroup(); }

  for (var offset = 1; offset <= groups.length; offset++) {
    var next = groups[(startIndex + offset) % groups.length];
    var summary = getAssignmentGroupSummary(next);
    if (summary.pending > 0 || summary.unclassified > 0) { return next; }
  }
  return null;
}

function findFirstAssignmentGroup() {
  var groups = getAssignmentGroupsInOrder();
  return groups.length > 0 ? groups[0] : null;
}

function getAssignmentGroupOrder(group) {
  var order = [
    "Reach Measures",
    "Reach Impoundment Measures",
    "Dam and Barrier Measures",
    "Dike Measures",
    "Sidearm Measures",
    "Groyne Measures",
    "Gravel Bars",
    "Sediment Feeding/Dredging",
    "Riverbank Restoration",
    "Sediment Contamination Measures",
    "Ecological Restoration in the Reservior",
    "Measures at the Delta",
    "unclassified"
  ];

  var index = order.indexOf(group);
  return index === -1 ? 999 : index + 1;
}

/* ------------------------------------------------------------------
   GEOMETRY LAYERS (drawn features per assignment_group)

   Maps each assignment_group to the layer where users actually draw
   its geometries, so the summary page can count how many features
   exist for the current reach - independent of what our own tool
   knows from Reach_Selected_Measures (which only tracks confirmation
   status, not the geometry itself).

   Add one entry per category as its layer + reach-linking (Arcade
   calculated expression or attribute rule) is set up. Categories
   without an entry here still show their measure count in the
   summary, just without a "geometries drawn" count.
------------------------------------------------------------------ */

var GEOMETRY_LAYERS = {
  "Sidearm Measures": {
    url: "https://iwah-public.boku.ac.at/server/rest/services/Hosted/Line_measures_dev/FeatureServer/52",
    reachIdField: "D4A_ID"
  }
};

// Only these groups currently show the inline "Please use the X edit
// tool..." instruction next to each pending measure. Dam and Barrier
// Measures is intentionally excluded - it's handled by automatic
// barrier-point matching at confirm time (autoAssignDamMeasuresToBarrierLayer),
// not by a manual drawing instruction. Add a group here once its
// drawing workflow + reach linking is set up and tested.
var GROUPS_WITH_INLINE_EDIT_INSTRUCTION = [
  "Dike Measures",
  "Groyne Measures",
  "Sidearm Measures"
];

async function getDrawnGeometryCountForGroup(group, reachId) {
  var layerInfo = GEOMETRY_LAYERS[group];
  if (!layerInfo || !isUrlConfigured(layerInfo.url)) {
    return { status: "not_configured", count: null, errorMessage: null };
  }

  try {
    var url = layerInfo.url.replace(/\/$/, "") + "/query";
    var where = layerInfo.reachIdField + " = '" + escapeSqlLiteral(reachId) + "'";

    var formData = new FormData();
    formData.append("f", "json");
    formData.append("where", where);
    formData.append("returnCountOnly", "true");

    if (layerInfo.token) {
      formData.append("token", layerInfo.token);
    }

    var response = await fetch(url, { method: "POST", body: formData });
    if (!response.ok) {
      return { status: "error", count: null, errorMessage: "HTTP error " + response.status };
    }

    var result = await response.json();
    if (result.error) {
      console.warn("Could not count drawn geometries for " + group + ":", result.error);
      return { status: "error", count: null, errorMessage: result.error.message || "ArcGIS query error" };
    }

    if (typeof result.count !== "number") {
      return { status: "error", count: null, errorMessage: "Unexpected response from layer (no count returned)" };
    }

    return { status: "ok", count: result.count, errorMessage: null };

  } catch (error) {
    console.warn("Could not count drawn geometries for " + group + ".", error);
    return { status: "error", count: null, errorMessage: error.message || "Network error" };
  }
}

/* ------------------------------------------------------------------
   SUMMARY PANEL

   Shown once every assignment_group has zero pending/unclassified
   measures left. Lists, per group: how many measures were selected,
   how many are assigned, and - where a GEOMETRY_LAYERS entry exists -
   how many geometries were actually drawn for this reach in that
   layer.
------------------------------------------------------------------ */

function allAssignmentGroupsComplete() {
  return findNextPendingAssignmentGroup() === null;
}



async function showSummaryPanel() {
  if (!allAssignmentGroupsComplete()) { return; }

  document.getElementById("assignment-tabs").classList.add("hidden");
  document.getElementById("assignment-body").classList.add("hidden");
  document.getElementById("summary-panel").classList.remove("hidden");

  var panel = document.getElementById("summary-panel");
  panel.innerHTML = '<div class="empty-state">Loading summary...</div>';

  var groups = getAssignmentGroupsInOrder();
  var reachId = getReachIdFromUrl();

  var rows = await Promise.all(groups.map(async function(group) {
    var summary = getAssignmentGroupSummary(group);
    var drawnResult = await getDrawnGeometryCountForGroup(group, reachId);
    return { group: group, summary: summary, drawnResult: drawnResult };
  }));

  panel.innerHTML =
    '<div class="assignment-title">Reach summary</div>' +
    '<div class="assignment-summary">All assignment groups for reach ' + escapeHtml(reachId) + ' are complete.</div>' +
    '<button class="back-button" type="button" onclick="hideSummaryPanel()" style="margin-bottom: 14px;">Back to assignment workflow</button>';

  rows.forEach(function(row) {
    if (row.summary.total === 0) { return; }

    var el = document.createElement("div");
    el.className = "summary-group";

    var countsText = '<strong>' + row.summary.assigned + '</strong> measure(s) assigned';

    if (row.drawnResult.status === "ok") {
      countsText += '<br><strong>' + row.drawnResult.count + '</strong> geometry/geometries drawn for this reach';
    } else if (row.drawnResult.status === "error") {
      countsText += '<br><span style="color:#c0392b;">Could not check drawn geometries (' + escapeHtml(row.drawnResult.errorMessage) + ')</span>';
    }

    el.innerHTML =
      '<div class="summary-group-name">' + escapeHtml(row.group) + '</div>' +
      '<div class="summary-group-counts">' + countsText + '</div>';

    panel.appendChild(el);
  });
}

function hideSummaryPanel() {
  document.getElementById("summary-panel").classList.add("hidden");
  document.getElementById("assignment-tabs").classList.remove("hidden");
  document.getElementById("assignment-body").classList.remove("hidden");
}

/* ------------------------------------------------------------------
   HELPERS
------------------------------------------------------------------ */

function getMeasureById(id) {
  return MEASURES.find(function(m) {
    return m.id === id;
  });
}

function getMeasureNumber(id) {
  var m = getMeasureById(id);
  return m && m.measure_no ? m.measure_no : 999999;
}

function normaliseProblemId(value) {
  return String(value).trim().toLowerCase();
}

function getAttributeCaseInsensitive(attributes, fieldName) {
  var target = normaliseProblemId(fieldName);
  var keys = Object.keys(attributes);

  for (var i = 0; i < keys.length; i++) {
    if (normaliseProblemId(keys[i]) === target) {
      return attributes[keys[i]];
    }
  }

  return undefined;
}

function isUrlConfigured(url) {
  return (
    url &&
    url.indexOf("PASTE_") === -1 &&
    url.indexOf("YOUR_") === -1
  );
}

function allAddsSuccessful(result) {
  if (!result || !result.addResults) { return false; }

  return result.addResults.every(function(r) {
    return r.success === true;
  });
}

function allUpdatesSuccessful(result) {
  if (!result || !result.updateResults) { return false; }

  return result.updateResults.every(function(r) {
    return r.success === true;
  });
}

function buildUpdateFeaturesErrorMessage(result) {
  if (!result || !result.updateResults || result.updateResults.length === 0) {
    return "ArcGIS updateFeatures returned no updateResults for the measure-status layer.";
  }

  var errors = result.updateResults
    .filter(function(r) { return r.success !== true; })
    .map(function(r) {
      if (!r.error) {
        return "Unsuccessful update with no ArcGIS error details.";
      }

      var parts = [];
      if (r.error.code !== undefined) { parts.push("code " + r.error.code); }
      if (r.error.message) { parts.push(r.error.message); }
      if (r.error.description) { parts.push(r.error.description); }

      return parts.join(": ");
    });

  if (errors.length === 0) {
    return "ArcGIS updateFeatures returned an unsuccessful update result for the measure-status layer, but no detailed error was provided.";
  }

  return "Measure-status update failed: " + errors.join(" | ");
}

function getAssignmentRuleForMeasure(measureId) {
  var normalizedId = normalizeMeasureId(measureId);
  return MEASURE_ASSIGNMENT_RULES[normalizedId] || null;
}

function getInitialAssignmentInfoForMeasure(measureId, rule, reachId, now) {
  var normalizedId = normalizeMeasureId(measureId);

  if (!rule) {
    return {
      assignment_group: "unclassified",
      assignment_target: "unclassified",
      geometry_type: "",
      assignment_mode: "manual_review",
      assignment_status: CONFIG.ASSIGNMENT_STATUS_UNCLASSIFIED,
      assigned_feature_id: null,
      assigned_layer: null,
      assigned_at: null
    };
  }

  var assignmentGroup = cleanRuleValue(rule.assignment_group) || "unclassified";
  var assignmentTarget = cleanRuleValue(rule.assignment_target) || "unclassified";
  var geometryType = cleanRuleValue(rule.geometry_type) || inferGeometryTypeFromRule(rule);
  var assignmentMode = cleanRuleValue(rule.assignment_mode).toLowerCase() || "manual_review";
  var autoAssign = isAutoAssignRule(rule);

  if (autoAssign) {
    return {
      assignment_group: assignmentGroup,
      assignment_target: assignmentTarget,
      geometry_type: geometryType,
      assignment_mode: assignmentMode,
      assignment_status: CONFIG.ASSIGNMENT_STATUS_ASSIGNED,
      assigned_feature_id: reachId,
      assigned_layer: CONFIG.ASSIGNED_LAYER_REACH,
      assigned_at: now
    };
  }

  return {
    assignment_group: assignmentGroup,
    assignment_target: assignmentTarget,
    geometry_type: geometryType,
    assignment_mode: assignmentMode,
    assignment_status: CONFIG.ASSIGNMENT_STATUS_PENDING,
    assigned_feature_id: null,
    assigned_layer: null,
    assigned_at: null
  };
}

function shouldUpdateReachStatusForMeasure(measureId) {
  var rule = getAssignmentRuleForMeasure(measureId);

  if (!rule) { return false; }
  if (!isAutoAssignRule(rule)) { return false; }

  return cleanRuleValue(rule.assignment_target).toLowerCase() === "reach";
}

function isAutoAssignRule(rule) {
  if (!rule) { return false; }

  var autoValue = rule.auto_assign_if_selected;
  var mode = cleanRuleValue(rule.assignment_mode).toLowerCase();

  return autoValue === 1 || autoValue === "1" || autoValue === true || mode === "automatic";
}

function isImpoundmentOnlyRule(rule) {
  return cleanRuleValue(rule.impoundment).toLowerCase() === "yes";
}

function getBarrierDisplayText() {
  if (currentReachHasBarrierContext === true) {
    return " | Barrier context: yes";
  }

  if (currentReachHasBarrierContext === false) {
    return " | No barrier context: barrier-only measures hidden";
  }

  return " | Barrier context not answered";
}

function getImpoundmentDisplayText() {
  if (currentReachIsImpounded === true) {
    return " | Impounded reach";
  }

  if (currentReachIsImpounded === false) {
    return " | Not impounded: impoundment-only measures hidden";
  }

  return " | Impoundment status unknown";
}

function getImpoundmentStatusTextForStatus() {
  if (currentReachIsImpounded === true) {
    return " for an impounded reach";
  }

  if (currentReachIsImpounded === false) {
    return "; impoundment-only measures were hidden";
  }

  return "; impoundment status was not available";
}

function getPendingAssignmentSummaryTextFromRecords(records) {
  var counts = {};

  records.forEach(function(record) {
    if (record.assignment_status === CONFIG.ASSIGNMENT_STATUS_ASSIGNED) { return; }

    var group = record.assignment_group || "unclassified";
    counts[group] = (counts[group] || 0) + 1;
  });

  var groups = Object.keys(counts).sort();

  if (groups.length === 0) {
    return "";
  }

  var parts = groups.map(function(group) {
    return counts[group] + " " + group;
  });

  return " Pending assignment: " + parts.join(", ") + ".";
}

function getPendingAssignmentSummaryText(measureIds) {
  var counts = {};

  measureIds.forEach(function(id) {
    var rule = getAssignmentRuleForMeasure(id);

    if (!rule || isAutoAssignRule(rule)) { return; }

    var group = cleanRuleValue(rule.assignment_group) || "unclassified";
    counts[group] = (counts[group] || 0) + 1;
  });

  var groups = Object.keys(counts).sort();

  if (groups.length === 0) {
    return "";
  }

  var parts = groups.map(function(group) {
    return counts[group] + " " + group;
  });

  return " Pending assignment: " + parts.join(", ") + ".";
}

function cleanRuleValue(value) {
  if (value === null || value === undefined) { return ""; }
  return String(value).replace(/\u00a0/g, " ").trim();
}

function inferGeometryTypeFromRule(rule) {
  var target = cleanRuleValue(rule.assignment_target).toLowerCase();
  var group = cleanRuleValue(rule.assignment_group).toLowerCase();

  if (target === "reach") { return "line"; }
  if (target.indexOf("dam") !== -1 || target.indexOf("barrier") !== -1) { return "point"; }
  if (target.indexOf("location") !== -1) { return "point"; }
  if (target.indexOf("dike") !== -1 || target.indexOf("groyne") !== -1 || target.indexOf("side") !== -1 || target.indexOf("riverbank") !== -1) { return "line"; }
  if (group.indexOf("dam") !== -1 || group.indexOf("gravel") !== -1 || group.indexOf("feeding") !== -1 || group.indexOf("dredging") !== -1) { return "point"; }

  return "";
}

function setStatus(message, type) {
  var el = document.getElementById("status-message");

  el.textContent = message;
  el.className = "status-message";

  if (type) {
    el.classList.add(type);
  }
}

function clearStatus() {
  setStatus("", "");
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeMeasureId(value) {
  // Normalises both internal measure IDs and ArcGIS field names to the same key.
  // Examples:
  //   D4A_001 -> D4A_001
  //   D4A_01  -> D4A_001
  //   D4A_1   -> D4A_001
  var raw = String(value).trim().toUpperCase();
  var match = raw.match(/^D4A_(\d{1,3})$/);

  if (!match) {
    return raw;
  }

  var numberPart = parseInt(match[1], 10);

  if (isNaN(numberPart)) {
    return raw;
  }

  return "D4A_" + String(numberPart).padStart(3, "0");
}

function escapeSqlLiteral(value) {
  return String(value).replaceAll("'", "''");
}

/* ------------------------------------------------------------------
   BEST-EFFORT CLEANUP ON TAB CLOSE

   Attempts to remove this session's own row immediately when the tab
   is closed cleanly. Uses sendBeacon because normal fetch() requests
   can be cancelled mid-flight when a page unloads - not guaranteed,
   but works for the common "closed the tab normally" case. The stale
   cleanup above is what guarantees eventual removal regardless.
------------------------------------------------------------------ */

window.addEventListener("pagehide", function() {
  if (!isAssignmentSessionConfigured()) { return; }

  // Keyed by country here too, consistent with upsertAssignmentSession -
  // session_id is not reliable across reloads in this embedded context.
  var url = CONFIG.ASSIGNMENT_SESSION_TABLE_URL.replace(/\/$/, "") + "/deleteFeatures";
  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", CONFIG.FIELD_SESSION_COUNTRY + " = '" + escapeSqlLiteral(activeCountryCode) + "'");
  if (CONFIG.ASSIGNMENT_SESSION_TOKEN) {
    formData.append("token", CONFIG.ASSIGNMENT_SESSION_TOKEN);
  }

  navigator.sendBeacon(url, formData);
});
</script>
